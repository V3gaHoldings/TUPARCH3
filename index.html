<script>
"use strict";

/* ============ DATA REAL (TSV completo) ============ */
var RAW_TSV = `EMP0001	Paula Martínez Martínez	100000001	empleado001@empresa-demo.com	Bucaramanga	Pacífico	Comercial	Equipo A	Supervisor Comercial	Líder	Felipe Vargas	2018-08-24		Activo	Indefinido	3895759	103162670	32539328		No
EMP0002	Carlos López García	100000002	empleado002@empresa-demo.com	Bogotá	Oriente	Ventas	Equipo D	Ejecutivo de Ventas	Profesional	Felipe Vargas	2019-05-08		Activo	Indefinido	4351839	80278831	80342553		No
EMP0003	Paula Ramírez Vargas	100000003	empleado003@empresa-demo.com	Cartagena	Oriente	Trade Marketing	Equipo C	Ejecutivo de Ventas	Profesional	Ricardo López	2023-12-02		Activo	Fijo	7940014	175972514	114899130		Sí
EMP0004	Paula García Vargas	100000004	empleado004@empresa-demo.com	Bogotá	Oriente	Ventas	Equipo D	Ejecutivo de Ventas	Profesional	Sandra Gómez	2018-07-19	2019-08-17	Inactivo	Indefinido	2572783	163915579	161318600	Renuncia Voluntaria	Sí
EMP0005	Luis García Vargas	100000005	empleado005@empresa-demo.com	Bogotá	Pacífico	Trade Marketing	Equipo B	Ejecutivo de Ventas	Profesional	Sandra Gómez	2023-08-24		Activo	Obra o Labor	4245750	105165063	32969623		No`;

/*
  IMPORTANTE: Por límite de espacio, arriba van solo 5 filas de ejemplo.
  Pega TODAS tus 300 filas dentro de los backticks de RAW_TSV (reemplaza el contenido).
  El formato debe ser EXACTAMENTE el mismo que pegaste (separado por TABS).
  Mantén una fila por línea, sin encabezado.
*/

/* ============ ESTADO ============ */
var DB = { employees: [], users: [] };
var CURRENT = null;

/* ============ HELPERS ============ */
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function clamp(n, a, b) { a = (a === undefined ? 0 : a); b = (b === undefined ? 100 : b); return Math.max(a, Math.min(b, n)); }
function fmtCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0); }
function avg(arr, f) { if (!arr.length) return 0; var s = 0; for (var i = 0; i < arr.length; i++) s += (f(arr[i]) || 0); return Math.round(s / arr.length); }
function activeEmp() { return DB.employees.filter(function (e) { return e.status === 'ACTIVO'; }); }
function num(v) { if (v == null || v === '') return 0; var n = Number(String(v).replace(/[^0-9.-]/g, '')); return isNaN(n) ? 0 : n; }
function riskStyle(l) { var m = { BAJO:'color:#10b981;background:#10b98119', MEDIO:'color:#f59e0b;background:#f59e0b19', ALTO:'color:#f97316;background:#f9731619', CRITICO:'color:#ef4444;background:#ef444419' }; return m[l] || ''; }

/* Hash determinístico para generar scores estables por cédula */
function seededRand(seed) { var x = Math.sin(seed) * 10000; return x - Math.floor(x); }

/* ============ SCORES ============ */
function computeScores(e) {
  // Genera stress/motivation/satisfaction deterministas basados en cédula + desempeño comercial
  var s = parseInt(e.cedula.slice(-4)) || 1;
  var achievement = e.salesGoal > 0 ? (e.salesAccumulated / e.salesGoal) * 100 : 60;
  // Bajo cumplimiento => más estrés, menos motivación
  var perfFactor = clamp(achievement, 0, 150) / 150;
  e.stress = Math.round(clamp(30 + seededRand(s) * 50 + (1 - perfFactor) * 25));
  e.motivation = Math.round(clamp(40 + perfFactor * 40 + seededRand(s * 2) * 20));
  e.satisfaction = Math.round(clamp(45 + perfFactor * 35 + seededRand(s * 3) * 20));
  e.performance = Math.round(clamp(50 + perfFactor * 45 + seededRand(s * 4) * 5));
  e.absentDays = Math.round(seededRand(s * 5) * 22);
  e.replacementCost = Math.round(e.baseSalary * (e.level === 'Líder' ? 4 : e.level === 'Profesional' ? 2.5 : 1.8));
  e.trainingCost = Math.round(e.baseSalary * 1.2);
  e.replTime = e.level === 'Líder' ? 90 : e.level === 'Profesional' ? 60 : 35;

  e.burnoutRisk = Math.round(clamp(e.stress * 0.6 + (100 - e.motivation) * 0.4));
  e.engagement = Math.round(clamp(e.motivation * 0.5 + e.satisfaction * 0.5));
  var risk = (e.stress / 100) * 18 + (e.burnoutRisk / 100) * 15 + ((100 - e.motivation) / 100) * 18 + ((100 - e.satisfaction) / 100) * 10;
  risk += clamp((e.absentDays / 30) * 100) / 100 * 10;
  if (e.salesGoal > 0 && achievement < 80) risk += ((80 - achievement) / 80) * 10;
  risk += ((100 - e.performance) / 100) * 8;
  e.retentionRisk = Math.round(clamp(risk));
  e.riskLevel = e.retentionRisk >= 75 ? 'CRITICO' : e.retentionRisk >= 50 ? 'ALTO' : e.retentionRisk >= 30 ? 'MEDIO' : 'BAJO';
}

/* ============ CARGAR DATA REAL ============ */
function loadRealData() {
  DB = { employees: [], users: [] };
  DB.users.push({ email: 'admin@empresa.com', pass: '1023456789', role: 'ADMIN', name: 'Administrador' });
  DB.users.push({ email: 'rrhh@empresa.com', pass: '1023456789', role: 'RRHH', name: 'Talento Humano' });

  var lines = RAW_TSV.trim().split('\n');
  lines.forEach(function (line) {
    var c = line.split('\t');
    if (c.length < 16) return;
    var status = /inactivo|retir/i.test(c[13]) ? 'RETIRADO' : 'ACTIVO';
    var e = {
      id: c[0], fullName: c[1], cedula: c[2], email: c[3].toLowerCase().trim(),
      city: c[4], regional: c[5], area: c[6], team: c[7], position: c[8], level: c[9],
      managerName: c[10], hireDate: c[11] || null, exitDate: c[12] || null,
      status: status, contractType: c[14], baseSalary: num(c[15]),
      salesGoal: num(c[16]), salesAccumulated: num(c[17]),
      exitReason: c[18] || null, isCritical: /sí|si/i.test(c[19] || ''),
      managerEmail: null
    };
    computeScores(e);
    DB.employees.push(e);
    DB.users.push({ email: e.email, pass: e.cedula, role: e.level === 'Líder' ? 'LIDER' : 'COLABORADOR', name: e.fullName });
  });
  saveDB();
}

function saveDB() { try { localStorage.setItem('t3db', JSON.stringify(DB)); } catch (e) {} }
function loadDB() {
  try { var d = localStorage.getItem('t3db'); if (d) DB = JSON.parse(d); } catch (e) {}
  if (!DB.employees || DB.employees.length < 10) loadRealData();
}

/* ============ MÉTRICAS ============ */
function mWorkforceHealth() {
  var a = activeEmp();
  return {
    health: avg(a, function (e) { return 100 - e.stress * 0.4 + e.engagement * 0.6 - 30; }),
    motivation: avg(a, function (e) { return e.motivation; }), stress: avg(a, function (e) { return e.stress; }),
    burnout: avg(a, function (e) { return e.burnoutRisk; }), satisfaction: avg(a, function (e) { return e.satisfaction; }),
    engagement: avg(a, function (e) { return e.engagement; }), total: a.length
  };
}
function mCommercial() {
  var a = activeEmp().filter(function (e) { return e.salesGoal > 0; });
  function seg(key) {
    var g = {};
    a.forEach(function (e) { var k = e[key] || 'N/A'; if (!g[k]) g[k] = { goal: 0, act: 0 }; g[k].goal += e.salesGoal; g[k].act += e.salesAccumulated; });
    return Object.keys(g).map(function (k) { return { name: k, achievement: g[k].goal ? +(g[k].act / g[k].goal * 100).toFixed(1) : 0 }; }).sort(function (x, y) { return y.achievement - x.achievement; });
  }
  var tg = 0, ta = 0; a.forEach(function (e) { tg += e.salesGoal; ta += e.salesAccumulated; });
  return { overall: tg ? +(ta / tg * 100).toFixed(1) : 0, totalGoal: tg, totalActual: ta,
    byRegional: seg('regional'), byCity: seg('city'), byArea: seg('area'), byTeam: seg('team'), byPosition: seg('position'), byManager: seg('managerName') };
}
function mTurnover() {
  var all = DB.employees, ret = all.filter(function (e) { return e.status === 'RETIRADO'; });
  function rate() { return +(ret.length / (all.length || 1) * 100).toFixed(1); }
  function seg(key) {
    var g = {};
    all.forEach(function (e) { var k = e[key] || 'N/A'; if (!g[k]) g[k] = { ex: 0, t: 0 }; g[k].t++; if (e.status === 'RETIRADO') g[k].ex++; });
    return Object.keys(g).map(function (k) { return { name: k, rate: +(g[k].ex / g[k].t * 100).toFixed(1), ex: g[k].ex, t: g[k].t }; }).sort(function (a, b) { return b.rate - a.rate; });
  }
  var reasons = {};
  ret.forEach(function (e) { var r = e.exitReason || 'N/E'; reasons[r] = (reasons[r] || 0) + 1; });
  return { overall: rate(), totalRet: ret.length, byCity: seg('city'), byRegional: seg('regional'), byArea: seg('area'), byPosition: seg('position'),
    causal: Object.keys(reasons).map(function (r) { return { reason: r, count: reasons[r] }; }).sort(function (a, b) { return b.count - a.count; }) };
}
function mFinancial() {
  var ret = DB.employees.filter(function (e) { return e.status === 'RETIRADO'; });
  var atRisk = activeEmp().filter(function (e) { return e.retentionRisk >= 50; });
  var repl = 0, train = 0, prod = 0, proj = 0;
  ret.forEach(function (e) { repl += e.replacementCost; train += e.trainingCost; prod += (e.baseSalary / 30) * e.replTime; });
  atRisk.forEach(function (e) { proj += (e.replacementCost + e.trainingCost) * (e.retentionRisk / 100); });
  var total = repl + train + prod;
  var roi = proj > 0 ? Math.round(((proj - proj * 0.15) / (proj * 0.15)) * 100) : 0;
  return { turnoverCost: total, replacementCost: repl, trainingCost: train, productivityLoss: prod, financialRisk: proj, economicImpact: total + proj, roi: roi, atRisk: atRisk.length };
}
function mInsights() {
  var e = activeEmp();
  function pearson(xs, ys) {
    var n = xs.length; if (n < 3) return 0; var mx = 0, my = 0; for (var i = 0; i < n; i++) { mx += xs[i]; my += ys[i]; } mx /= n; my /= n;
    var num = 0, dx = 0, dy = 0; for (var k = 0; k < n; k++) { num += (xs[k] - mx) * (ys[k] - my); dx += Math.pow(xs[k] - mx, 2); dy += Math.pow(ys[k] - my, 2); }
    return (dx && dy) ? +(num / Math.sqrt(dx * dy)).toFixed(2) : 0;
  }
  var stress = e.map(function (x) { return x.stress; }), mot = e.map(function (x) { return x.motivation; });
  var ach = e.map(function (x) { return x.salesGoal > 0 ? x.salesAccumulated / x.salesGoal * 100 : 0; });
  var ret = e.map(function (x) { return x.retentionRisk; }), abs = e.map(function (x) { return x.absentDays; });
  var out = [];
  var c1 = pearson(stress, ach); if (c1 < -0.1) out.push('Los colaboradores con altos niveles de estrés presentan una reducción promedio del ' + Math.abs(Math.round(c1 * 20)) + '% en cumplimiento de metas.');
  var c2 = pearson(mot, ret); if (c2 < -0.1) out.push('Los colaboradores con mayor motivación muestran menor intención de renuncia (correlación ' + c2 + ').');
  var c3 = pearson(stress, abs); if (c3 > 0.1) out.push('El estrés laboral se correlaciona con mayor ausentismo (' + c3 + ').');
  var c4 = pearson(mot, ach); if (c4 > 0.1) out.push('Mayor motivación se asocia con mejor cumplimiento comercial (' + c4 + ').');
  if (!out.length) out.push('Análisis estadístico de correlaciones organizacionales en proceso.');
  return out;
}

/* ============ UI ============ */
function kpi(t, v, s, c) { var clr = { blue:'#3b82f6', green:'#10b981', amber:'#f59e0b', red:'#ef4444', purple:'#a855f7' }[c]; return '<div class="kpi fade" style="border:1px solid '+clr+'33;background:'+clr+'0d;"><div class="label">'+t+'</div><div class="val">'+v+'</div>'+(s?'<div class="sub">'+s+'</div>':'')+'</div>'; }
function card(t, b) { return '<div class="card">'+(t?'<h3>'+t+'</h3>':'')+b+'</div>'; }
function bar(n, p) { return '<div class="barrow"><span class="name">'+n+'</span><div class="bartrack"><div class="barfill" style="width:'+Math.min(p,100)+'%"></div></div><span class="pct">'+p+'%</span></div>'; }

var VIEWS = {
  executive: function () {
    var h = mWorkforceHealth(), c = mCommercial(), t = mTurnover(), f = mFinancial(), ins = mInsights();
    return '<h2 class="title">Dashboard Ejecutivo</h2><p class="subtitle">Inteligencia organizacional · '+h.total+' colaboradores activos · '+DB.employees.length+' totales</p>' +
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:24px;">' +
        kpi('Workforce Health', h.health, 'Salud organizacional', 'green') + kpi('Cumplimiento Comercial', c.overall + '%', fmtCOP(c.totalActual), 'blue') +
        kpi('Rotación Histórica', t.overall + '%', t.totalRet + ' retiros', 'amber') + kpi('Impacto Económico', fmtCOP(f.economicImpact), f.atRisk + ' en riesgo', 'red') + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' +
        card('Componentes de Salud', bar('Motivación', h.motivation) + bar('Satisfacción', h.satisfaction) + bar('Compromiso', h.engagement) + bar('Bajo Estrés', 100 - h.stress) + bar('Sin Burnout', 100 - h.burnout)) +
        card('🧠 Workforce Insights™', ins.map(function (i) { return '<div class="insight">✨ ' + i + '</div>'; }).join('')) + '</div>' +
      card('Cumplimiento por Regional', c.byRegional.map(function (r) { return bar(r.name, r.achievement); }).join(''));
  },
  commercial: function () {
    var c = mCommercial();
    return '<h2 class="title">Productividad Comercial</h2><p class="subtitle">Análisis de cumplimiento de metas</p>' +
      '<div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">' + kpi('Cumplimiento General', c.overall + '%', '', 'blue') + kpi('Meta Total', fmtCOP(c.totalGoal), '', 'purple') + kpi('Ventas Acumuladas', fmtCOP(c.totalActual), '', 'green') + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' + card('Por Regional', c.byRegional.map(function (r) { return bar(r.name, r.achievement); }).join('')) + card('Por Ciudad', c.byCity.map(function (r) { return bar(r.name, r.achievement); }).join('')) + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' + card('Por Área', c.byArea.map(function (r) { return bar(r.name, r.achievement); }).join('')) + card('Por Equipo', c.byTeam.map(function (r) { return bar(r.name, r.achievement); }).join('')) + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;">' + card('Por Cargo', c.byPosition.map(function (r) { return bar(r.name, r.achievement); }).join('')) + card('Por Jefe Directo', c.byManager.map(function (r) { return bar(r.name, r.achievement); }).join('')) + '</div>';
  },
  hr: function () {
    var c = mCommercial();
    var heat = {}; activeEmp().forEach(function (e) { var k = e.area || 'N/A'; if (!heat[k]) heat[k] = []; heat[k].push(e.stress); });
    var leaderRank = {};
    activeEmp().forEach(function (e) { var m = e.managerName || 'N/A'; if (!leaderRank[m]) leaderRank[m] = []; leaderRank[m].push(e.engagement); });
    var lr = Object.keys(leaderRank).map(function (m) { return { name: m, score: avg(leaderRank[m].map(function (x) { return { e: x }; }), function (o) { return o.e; }), n: leaderRank[m].length }; }).sort(function (a, b) { return b.score - a.score; });
    return '<h2 class="title">Recursos Humanos</h2><p class="subtitle">Heatmaps · Rankings · Análisis de equipos</p>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' +
        card('🏆 Ranking de Líderes (Engagement)', lr.map(function (l, i) { return '<div class="row"><span><span class="rank">#'+(i+1)+'</span>'+l.name+' ('+l.n+')</span><span style="font-weight:600;">'+l.score+'</span></div>'; }).join('')) +
        card('🔥 Heatmap de Estrés por Área', Object.keys(heat).map(function (area) { var arr = heat[area]; var v = Math.round(arr.reduce(function (a, b) { return a + b; }, 0) / arr.length); var color = v > 60 ? '#ef4444' : v > 45 ? '#f59e0b' : '#10b981'; return '<div class="barrow"><span class="name">'+area+'</span><div style="flex:1;height:24px;border-radius:4px;background:'+color+';opacity:'+(0.4+v/170)+'"></div><span class="pct">'+v+'</span></div>'; }).join('')) + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;">' + card('✅ Equipos con Mejor Desempeño', c.byTeam.slice(0, 5).map(function (r) { return bar(r.name, r.achievement); }).join('')) + card('⚠️ Equipos en Riesgo', c.byTeam.slice().reverse().slice(0, 5).map(function (r) { return bar(r.name, r.achievement); }).join('')) + '</div>';
  },
  retention: function () {
    var t = mTurnover();
    var atRisk = activeEmp().filter(function (e) { return e.retentionRisk >= 50; }).sort(function (a, b) { return b.retentionRisk - a.retentionRisk; }).slice(0, 20);
    return '<h2 class="title">Retención &amp; Rotación</h2><p class="subtitle">Retention Risk Score™ · Predicción de abandono</p>' +
      '<div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px;">' + kpi('Rotación Total', t.overall + '%', '', 'red') + kpi('Retiros', t.totalRet, 'colaboradores', 'amber') + kpi('En Riesgo Alto', atRisk.length, 'requieren acción', 'purple') + kpi('Regional Crítica', t.byRegional[0] ? t.byRegional[0].name : '-', t.byRegional[0] ? t.byRegional[0].rate + '%' : '', 'blue') + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' +
        card('⚠️ Empleados en Riesgo de Abandono', '<div style="max-height:420px;overflow-y:auto;">' + atRisk.map(function (e) { return '<div class="risk-item"><div><div style="font-size:13px;font-weight:500;">'+e.fullName+'</div><div style="font-size:11px;color:#64748b;">'+e.position+' · '+e.area+' · '+e.regional+'</div></div><div style="display:flex;align-items:center;gap:12px;"><span class="badge" style="'+riskStyle(e.riskLevel)+'">'+e.riskLevel+'</span><span style="font-size:18px;font-weight:700;">'+e.retentionRisk+'</span></div></div>'; }).join('') + '</div>') +
        card('📋 Ranking de Causales de Retiro', t.causal.map(function (c, i) { return '<div class="row"><span><span class="rank">#'+(i+1)+'</span>'+c.reason+'</span><span style="font-weight:600;">'+c.count+'</span></div>'; }).join('')) + '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;">' + card('Rotación por Regional', t.byRegional.map(function (r) { return bar(r.name + ' ('+r.ex+'/'+r.t+')', r.rate); }).join('')) + card('Rotación por Cargo', t.byPosition.map(function (r) { return bar(r.name, r.rate); }).join('')) + '</div>';
  },
  financial: function () {
    var f = mFinancial();
    return '<h2 class="title">Dashboard Financiero</h2><p class="subtitle">Impacto económico de la rotación</p>' +
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:24px;">' +
        kpi('Costo de Rotación', fmtCOP(f.turnoverCost), '', 'red') + kpi('Costo de Reemplazo', fmtCOP(f.replacementCost), '', 'amber') + kpi('Costo Capacitación', fmtCOP(f.trainingCost), '', 'purple') +
        kpi('Productividad Perdida', fmtCOP(f.productivityLoss), '', 'blue') + kpi('Riesgo Financiero', fmtCOP(f.financialRisk), f.atRisk + ' empleados', 'red') + kpi('ROI de Retención', f.roi + '%', 'Retorno estimado', 'green') + '</div>' +
      card('Impacto Económico Total', '<p style="font-size:32px;font-weight:700;">' + fmtCOP(f.economicImpact) + '</p><p style="font-size:13px;color:#64748b;margin-top:8px;">Suma de costos de rotación histórica + riesgo proyectado de abandono de los ' + f.atRisk + ' colaboradores en riesgo alto/crítico.</p>');
  },
  coach: function () {
    setTimeout(scrollChat, 30);
    return '<div style="max-width:760px;margin:0 auto;"><h2 class="title">TUPARCH3 AI Coach™</h2><p class="subtitle">Tu coach organizacional personal · Confidencial</p>' +
      '<div id="chatBox" style="height:50vh;overflow-y:auto;border:1px solid #e2e8f0;border-radius:12px;padding:16px;background:#fff;"></div>' +
      '<div style="display:flex;gap:8px;margin-top:12px;"><input id="chatInput" placeholder="Escribe tu mensaje..." style="flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:12px;font-size:14px;"><button id="chatSend" style="width:48px;border:none;border-radius:10px;background:#4f46e5;color:#fff;cursor:pointer;font-size:18px;">➤</button></div></div>';
  },
  import: function () {
    return '<div style="max-width:600px;margin:0 auto;"><h2 class="title">Importación Masiva</h2><p class="subtitle">Carga Excel (.xlsx) para reemplazar o ampliar la data actual.</p>' +
      card('', '<label class="dropzone"><svg width="40" height="40" fill="none" stroke="#6366f1" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg><span id="fileName" style="font-size:14px;font-weight:500;">Selecciona archivo .xlsx</span><input id="fileInput" type="file" accept=".xlsx,.xls" style="display:none;"></label><button id="importBtn" class="btn-primary" style="margin-top:16px;opacity:.5;" disabled>Importar y Procesar</button>') +
      '<button onclick="resetData()" style="margin-top:12px;width:100%;border:1px solid #e2e8f0;background:#fff;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;">🔄 Restaurar data demo original (300 empleados)</button>' +
      '<div id="importResult" style="margin-top:24px;"></div></div>';
  }
};

window.resetData = function () { localStorage.removeItem('t3db'); loadRealData(); alert('Data restaurada: ' + DB.employees.length + ' empleados'); go('executive'); };

/* ============ NAV ============ */
var NAV = [{ id:'executive', label:'Dashboard Ejecutivo' }, { id:'commercial', label:'Productividad Comercial' }, { id:'hr', label:'Recursos Humanos' }, { id:'retention', label:'Retención & Rotación' }, { id:'financial', label:'Dashboard Financiero' }, { id:'coach', label:'AI Coach™' }, { id:'import', label:'Importar Datos' }];
function renderNav() {
  var nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(function (i) { return '<button class="navbtn" data-view="' + i.id + '">' + i.label + '</button>'; }).join('');
  var btns = nav.querySelectorAll('.navbtn');
  for (var k = 0; k < btns.length; k++) btns[k].addEventListener('click', function () { go(this.getAttribute('data-view')); });
}
function go(view) {
  var btns = document.querySelectorAll('.navbtn');
  for (var k = 0; k < btns.length; k++) btns[k].classList.toggle('active', btns[k].getAttribute('data-view') === view);
  document.getElementById('main').innerHTML = VIEWS[view]();
  if (view === 'coach') bindCoach();
  if (view === 'import') bindImport();
}

/* ============ AI COACH ============ */
var chatHistory = [{ role: 'assistant', content: 'Hola, soy TUPARCH3 AI Coach™. Estoy aquí para acompañarte en tu desarrollo y bienestar laboral. ¿En qué puedo ayudarte hoy?' }];
function scrollChat() {
  var box = document.getElementById('chatBox'); if (!box) return;
  box.innerHTML = chatHistory.map(function (m) { var u = m.role === 'user'; return '<div style="display:flex;justify-content:'+(u?'flex-end':'flex-start')+';margin-bottom:12px;"><div style="max-width:80%;border-radius:14px;padding:10px 14px;font-size:14px;background:'+(u?'#4f46e5;color:#fff':'#f1f5f9;color:#0f172a')+';">'+m.content+'</div></div>'; }).join('');
  box.scrollTop = box.scrollHeight;
}
function coachReply(msg) {
  var t = msg.toLowerCase();
  if (/estr[eé]s|presi|agobi|satura/.test(t)) return 'Entiendo que sientes una carga importante. ¿Qué situación específica te genera más presión esta semana? Te propongo identificar las 3 tareas de mayor impacto y bloquear 2 horas sin interrupciones. ¿Cuál sería la primera?';
  if (/renunci|irme|dejar|oferta/.test(t)) return 'Gracias por la confianza. Antes de decidir, analicemos: ¿qué te llevaría a quedarte y qué te empuja a salir? ¿Qué cambio concreto mejoraría tu situación actual?';
  if (/motiva|desanim|sin ganas|aburri/.test(t)) return 'La motivación fluctúa, reconocerlo es el primer paso. ¿Qué parte de tu trabajo te hacía sentir orgulloso hace unos meses? Recuperemos un pequeño logro diario. ¿Qué lograste hoy?';
  if (/jefe|l[ií]der|equipo/.test(t)) return 'El liderazgo impacta el desempeño. ¿Qué comportamiento específico te gustaría cambiar? Diseñemos una conversación asertiva. ¿Qué necesitas comunicar?';
  if (/meta|venta|objetivo|cumplim/.test(t)) return 'Las metas pueden sentirse retadoras. ¿En qué etapa se estancan tus negocios? Enfócate en los 3 clientes con mayor probabilidad de cierre esta semana. ¿Quiénes son?';
  if (/tiempo|organiz|prioriz/.test(t)) return 'Organizar el tiempo reduce el estrés. ¿Qué tarea importante pero no urgente estás postergando? Agéndala como primera del día. ¿Cuál es?';
  return 'Gracias por compartirlo. Cuéntame más: ¿qué te gustaría mejorar o resolver en tu día a día laboral? Estoy aquí para escucharte y construir contigo un plan de acción.';
}
function bindCoach() {
  var send = document.getElementById('chatSend'), input = document.getElementById('chatInput');
  function doSend() { var msg = input.value.trim(); if (!msg) return; chatHistory.push({ role: 'user', content: msg }); input.value = ''; scrollChat(); setTimeout(function () { chatHistory.push({ role: 'assistant', content: coachReply(msg) }); scrollChat(); }, 500); }
  send.addEventListener('click', doSend);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSend(); });
}

/* ============ IMPORT EXCEL ============ */
var COLMAP = { 'ID Empleado':'id', 'Nombre Completo':'fullName', 'Cédula':'cedula', 'Correo Corporativo':'email', 'Ciudad':'city', 'Regional':'regional', 'Área':'area', 'Equipo':'team', 'Cargo':'position', 'Nivel de Cargo':'level', 'Jefe Directo':'managerName', 'Fecha de Ingreso':'hireDate', 'Fecha de Retiro':'exitDate', 'Estado':'status', 'Tipo de Contrato':'contractType', 'Salario Base Mensual':'baseSalary', 'Meta de Ventas Mensual':'salesGoal', 'Ventas Acumuladas Mes':'salesAccumulated', 'Motivo de Retiro':'exitReason', 'Cargo Crítico':'isCritical' };
var pendingFile = null;
function bindImport() {
  var fi = document.getElementById('fileInput'), btn = document.getElementById('importBtn');
  fi.addEventListener('change', function (e) { pendingFile = e.target.files[0]; document.getElementById('fileName').textContent = pendingFile ? pendingFile.name : 'Selecciona archivo .xlsx'; btn.disabled = !pendingFile; btn.style.opacity = pendingFile ? '1' : '.5'; });
  btn.addEventListener('click', function () {
    if (!pendingFile) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      var wb = XLSX.read(ev.target.result, { type: 'array' });
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      DB = { employees: [], users: [] };
      DB.users.push({ email: 'admin@empresa.com', pass: '1023456789', role: 'ADMIN', name: 'Administrador' });
      DB.users.push({ email: 'rrhh@empresa.com', pass: '1023456789', role: 'RRHH', name: 'Talento Humano' });
      var created = 0;
      rows.forEach(function (row) {
        var r = {}; for (var c in COLMAP) r[COLMAP[c]] = row[c];
        if (!r.email || !r.cedula) return;
        var status = /inactivo|retir/i.test(String(r.status)) ? 'RETIRADO' : 'ACTIVO';
        var e = { id: String(r.id || r.cedula), fullName: String(r.fullName || '').trim(), cedula: String(r.cedula).trim(), email: String(r.email).toLowerCase().trim(), city: r.city || '', regional: r.regional || '', area: r.area || '', team: r.team || '', position: r.position || '', level: r.level || '', managerName: r.managerName || '', hireDate: r.hireDate || null, exitDate: r.exitDate || null, status: status, contractType: r.contractType || '', baseSalary: num(r.baseSalary), salesGoal: num(r.salesGoal), salesAccumulated: num(r.salesAccumulated), exitReason: r.exitReason || null, isCritical: /sí|si|true|1/i.test(String(r.isCritical)), managerEmail: null };
        computeScores(e); DB.employees.push(e); created++;
        DB.users.push({ email: e.email, pass: e.cedula, role: e.level === 'Líder' ? 'LIDER' : 'COLABORADOR', name: e.fullName });
      });
      saveDB();
      var leaders = DB.users.filter(function (u) { return u.role === 'LIDER'; }).length;
      document.getElementById('importResult').innerHTML = card('✅ Importación Completada', '<div class="grid" style="grid-template-columns:1fr 1fr;"><div class="stat-box"><div class="l">Empleados importados</div><div class="v">'+created+'</div></div><div class="stat-box"><div class="l">Líderes detectados</div><div class="v">'+leaders+'</div></div></div><button onclick="go(\'executive\')" class="btn-primary" style="margin-top:16px;">Ver Dashboard →</button>');
    };
    reader.readAsArrayBuffer(pendingFile);
  });
}

/* ============ AUTH / INIT ============ */
function startApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userName').textContent = CURRENT.name;
  renderNav(); go('executive');
}
function init() {
  loadDB();
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value.toLowerCase().trim(), pass = document.getElementById('pass').value, u = null;
    for (var i = 0; i < DB.users.length; i++) if (DB.users[i].email === email && DB.users[i].pass === pass) { u = DB.users[i]; break; }
    var err = document.getElementById('loginErr');
    if (!u) { err.textContent = 'Credenciales inválidas'; err.style.display = 'block'; return; }
    CURRENT = u; startApp();
  });
  document.getElementById('logoutBtn').addEventListener('click', function () { CURRENT = null; document.getElementById('app').style.display = 'none'; document.getElementById('login').style.display = 'flex'; });
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
