<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUPARCH3™ — Configurador</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
body{font-family:-apple-system,system-ui,sans-serif}
.fade-in{animation:f .4s ease}@keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#6366f1;border-radius:8px}
.glow{box-shadow:0 0 50px rgba(99,102,241,.18)}
</style>
</head>
<body class="bg-zinc-950 text-zinc-100">
<div id="app"></div>
<script>
/* ============================================================
   TUPARCH3 — Configurador con datos editables (localStorage)
============================================================ */
let OPENAI_API_KEY = localStorage.getItem('t3_key')||"";

/* ---------- DATOS POR DEFECTO ---------- */
const DEFAULT={
  company:{name:"Mi Empresa",slug:"miempresa",industry:"Tecnología",avgSalary:55000,turnover:18,contact:"Director"},
  teams:[
    {name:"Equipo A",workpulse:72,burnout:38,retention:22,size:14},
    {name:"Equipo B",workpulse:54,burnout:61,retention:48,size:9},
    {name:"Equipo C",workpulse:43,burnout:74,retention:65,size:11},
  ],
  insights:[
    {sev:"critical",title:"Riesgo de burnout detectado",body:"Un equipo muestra burnout elevado. Requiere atención inmediata."},
    {sev:"warning",title:"Caída de motivación",body:"Tendencia a la baja en bienestar este mes."},
  ]
};
function loadData(){const s=localStorage.getItem('t3_data');return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT));}
function saveData(d){localStorage.setItem('t3_data',JSON.stringify(d));}
let DATA=loadData();
let SESSION=null,CURRENT="home";

/* ---------- ROI ---------- */
function computeROI(){
  const teams=DATA.teams,avgSalary=DATA.company.avgSalary,tr=DATA.company.turnover/100;
  const totalEmp=teams.reduce((a,t)=>a+t.size,0)||1;
  const totalSalary=totalEmp*avgSalary;
  const turnoverCost=totalSalary*tr*0.75;
  const improvedCost=totalSalary*Math.max(tr-0.06,0.05)*0.75;
  const savings=turnoverCost-improvedCost;
  const highRisk=teams.filter(t=>t.burnout>65);
  const prodLoss=highRisk.reduce((a,t)=>a+t.size*avgSalary*0.15,0);
  const platformCost=totalEmp*96;
  const estimatedSavings=savings+prodLoss*0.5;
  const roi=platformCost?Math.round((estimatedSavings-platformCost)/platformCost*100):0;
  return{turnoverCost:Math.round(turnoverCost),prodLoss:Math.round(prodLoss),savings:Math.round(estimatedSavings),roi,totalEmp};
}
const fmt=n=>"$"+Math.round(n).toLocaleString('en-US');

/* ---------- IA ---------- */
async function aiReply(message,history){
  if(OPENAI_API_KEY){
    try{const res=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENAI_API_KEY},
      body:JSON.stringify({model:"gpt-4o-mini",temperature:.6,messages:[
        {role:"system",content:"Eres TUPARCH3 Coach de bienestar laboral. NO terapeuta. Coaching: estrés, carga, motivación, liderazgo. Cálido, breve, en español."},
        ...history,{role:"user",content:message}]})});
      const d=await res.json();return d.choices[0].message.content;}
    catch(e){return "⚠️ Error de conexión IA.";}}
  const m=message.toLowerCase();
  if(m.includes("estr")||m.includes("cansad")||m.includes("agot"))return "Entiendo la presión. 🌿 Identifica las 3 tareas que más te drenan esta semana. ¿Cuál podrías delegar o aplazar 48h?";
  if(m.includes("jefe")||m.includes("lider"))return "El liderazgo impacta el bienestar. ¿Qué necesitas: claridad, reconocimiento o autonomía? Preparemos una conversación breve.";
  if(m.includes("motiv"))return "La motivación cae al perder el propósito. 🎯 ¿Recuerdas un momento donde tu trabajo se sintió valioso?";
  return "Gracias por compartirlo. 🙏 ¿Es puntual de esta semana o llevas tiempo así?";
}
function classify(m){m=m.toLowerCase();if(m.includes("estr")||m.includes("cansad"))return"burnout";if(m.includes("jefe")||m.includes("lider"))return"leadership";if(m.includes("motiv"))return"motivation";if(m.includes("carga"))return"workload";return"communication";}

/* ---------- ROUTER ---------- */
function go(v){window.scrollTo(0,0);render(v);}
function render(v="home"){CURRENT=v;const a=document.getElementById("app");let h="";
  if(v==="home")h=Home();else if(v==="config")h=Config();else if(v==="app"){if(!SESSION){go("login");return;}h=Shell();}else if(v==="login")h=Login();
  a.innerHTML=`<div class="fade-in">${h}</div>`;if(v==="app")mountApp();}

/* ---------- HOME ---------- */
function Home(){return `
<nav class="flex justify-between items-center px-6 md:px-12 py-5 max-w-7xl mx-auto">
  <span class="font-bold text-xl">TUPARCH3™</span>
  <button onclick="go('config')" class="rounded-full bg-zinc-800 px-4 py-2 text-sm">⚙️ Configurar datos</button>
</nav>
<section class="max-w-3xl mx-auto text-center px-6 pt-24 pb-16">
  <span class="inline-block rounded-full border border-indigo-700 px-4 py-1 text-xs text-indigo-400 mb-6">Workforce Intelligence · IA</span>
  <h1 class="text-4xl md:text-5xl font-bold leading-tight">Demo personalizada para<br><span class="text-indigo-500">${DATA.company.name}</span></h1>
  <p class="mt-6 text-zinc-400">Convierte el bienestar laboral en ROI medible. Coaching con IA, detección de burnout y analítica de rotación.</p>
  <div class="mt-10 flex gap-4 justify-center flex-wrap">
    <button onclick="go('login')" class="rounded-xl bg-indigo-600 hover:bg-indigo-700 px-8 py-4 font-medium glow">▶ Iniciar Demo</button>
    <button onclick="go('config')" class="rounded-xl border border-zinc-700 px-8 py-4 font-medium">⚙️ Editar mis datos</button>
  </div>
</section>
<section class="max-w-5xl mx-auto px-6 pb-20 grid md:grid-cols-3 gap-4">
  ${[["🤖","Chat IA","Coaching de bienestar 24/7"],["📊","Analytics","Patrones anonimizados"],["💰","ROI","Bienestar en dinero"]].map(([i,t,d])=>`<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><div class="text-3xl">${i}</div><h3 class="font-semibold mt-2">${t}</h3><p class="text-sm text-zinc-400 mt-1">${d}</p></div>`).join("")}
</section>`;}

/* ---------- CONFIG (EDITOR) ---------- */
function Config(){return `
<div class="max-w-3xl mx-auto px-6 py-10">
  <button onclick="go('home')" class="text-xs text-zinc-500 mb-4">← Volver</button>
  <h1 class="text-2xl font-bold mb-6">⚙️ Configura tu demo</h1>

  <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6 mb-6">
    <h2 class="font-semibold mb-4">🏢 Datos de la empresa</h2>
    <div class="grid md:grid-cols-2 gap-3">
      <div><label class="text-xs text-zinc-400">Nombre empresa</label><input id="cName" value="${DATA.company.name}" class="w-full mt-1 rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm"></div>
      <div><label class="text-xs text-zinc-400">Industria</label><input id="cInd" value="${DATA.company.industry}" class="w-full mt-1 rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm"></div>
      <div><label class="text-xs text-zinc-400">Salario promedio anual</label><input id="cSal" type="number" value="${DATA.company.avgSalary}" class="w-full mt-1 rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm"></div>
      <div><label class="text-xs text-zinc-400">Rotación actual (%)</label><input id="cTur" type="number" value="${DATA.company.turnover}" class="w-full mt-1 rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm"></div>
      <div><label class="text-xs text-zinc-400">Persona contacto (saludo IA)</label><input id="cCon" value="${DATA.company.contact}" class="w-full mt-1 rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm"></div>
    </div>
  </div>

  <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6 mb-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="font-semibold">👥 Equipos / Áreas</h2>
      <button onclick="addTeam()" class="text-xs bg-indigo-600 px-3 py-1.5 rounded-lg">+ Agregar equipo</button>
    </div>
    <p class="text-xs text-zinc-500 mb-3">WorkPulse y Burnout/Rotación van de 0 a 100. Más burnout/rotación = más rojo (más urgencia en demo).</p>
    <div id="teamList">${teamRows()}</div>
  </div>

  <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6 mb-6">
    <div class="flex justify-between items-center mb-4">
      <h2 class="font-semibold">💡 Insights / Alertas</h2>
      <button onclick="addInsight()" class="text-xs bg-indigo-600 px-3 py-1.5 rounded-lg">+ Agregar insight</button>
    </div>
    <div id="insightList">${insightRows()}</div>
  </div>

  <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6 mb-6">
    <h2 class="font-semibold mb-3">🔑 OpenAI (opcional, para IA real)</h2>
    <input id="cKey" type="password" placeholder="sk-... (déjalo vacío para modo demo)" value="${OPENAI_API_KEY}" class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2 text-sm">
  </div>

  <div class="flex gap-3">
    <button onclick="saveConfig()" class="flex-1 rounded-xl bg-emerald-600 hover:bg-emerald-700 py-3 font-medium">💾 Guardar y ver demo</button>
    <button onclick="resetConfig()" class="rounded-xl bg-zinc-800 px-5 py-3">🔄 Resetear</button>
  </div>
</div>`;}

function teamRows(){return DATA.teams.map((t,i)=>`
<div class="grid grid-cols-12 gap-2 mb-2 items-center">
  <input data-tn="${i}" value="${t.name}" placeholder="Nombre" class="col-span-4 rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
  <input data-tw="${i}" type="number" value="${t.workpulse}" title="WorkPulse" class="col-span-2 rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
  <input data-tb="${i}" type="number" value="${t.burnout}" title="Burnout" class="col-span-2 rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
  <input data-tr="${i}" type="number" value="${t.retention}" title="Rotación" class="col-span-2 rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
  <input data-ts="${i}" type="number" value="${t.size}" title="Personas" class="col-span-1 rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
  <button onclick="delTeam(${i})" class="col-span-1 text-rose-400 text-xs">✕</button>
</div>`).join("")+`<div class="grid grid-cols-12 gap-2 text-[10px] text-zinc-500 mt-1"><span class="col-span-4">Nombre</span><span class="col-span-2">Pulse</span><span class="col-span-2">Burnout</span><span class="col-span-2">Rotación</span><span class="col-span-1">#</span></div>`;}

function insightRows(){return DATA.insights.map((it,i)=>`
<div class="mb-2 flex gap-2 items-start">
  <select data-is="${i}" class="rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
    <option value="critical" ${it.sev==='critical'?'selected':''}>🔴 Crítico</option>
    <option value="warning" ${it.sev==='warning'?'selected':''}>🟡 Alerta</option>
    <option value="info" ${it.sev==='info'?'selected':''}>🔵 Info</option>
  </select>
  <div class="flex-1 space-y-1">
    <input data-it="${i}" value="${it.title}" placeholder="Título" class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">
    <textarea data-ib="${i}" placeholder="Descripción" class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-2 py-1.5 text-xs">${it.body}</textarea>
  </div>
  <button onclick="delInsight(${i})" class="text-rose-400 text-xs">✕</button>
</div>`).join("");}

function readForm(){
  DATA.company.name=cName.value;DATA.company.industry=cInd.value;
  DATA.company.avgSalary=+cSal.value;DATA.company.turnover=+cTur.value;DATA.company.contact=cCon.value;
  DATA.company.slug=cName.value.toLowerCase().replace(/\s+/g,'');
  DATA.teams.forEach((t,i)=>{
    t.name=document.querySelector(`[data-tn="${i}"]`).value;
    t.workpulse=+document.querySelector(`[data-tw="${i}"]`).value;
    t.burnout=+document.querySelector(`[data-tb="${i}"]`).value;
    t.retention=+document.querySelector(`[data-tr="${i}"]`).value;
    t.size=+document.querySelector(`[data-ts="${i}"]`).value;});
  DATA.insights.forEach((it,i)=>{
    it.sev=document.querySelector(`[data-is="${i}"]`).value;
    it.title=document.querySelector(`[data-it="${i}"]`).value;
    it.body=document.querySelector(`[data-ib="${i}"]`).value;});
}
function addTeam(){readForm();DATA.teams.push({name:"Nuevo equipo",workpulse:60,burnout:40,retention:30,size:10});document.getElementById("teamList").innerHTML=teamRows();}
function delTeam(i){readForm();DATA.teams.splice(i,1);document.getElementById("teamList").innerHTML=teamRows();}
function addInsight(){readForm();DATA.insights.push({sev:"warning",title:"Nuevo insight",body:""});document.getElementById("insightList").innerHTML=insightRows();}
function delInsight(i){readForm();DATA.insights.splice(i,1);document.getElementById("insightList").innerHTML=insightRows();}
function saveConfig(){readForm();OPENAI_API_KEY=cKey.value.trim();localStorage.setItem('t3_key',OPENAI_API_KEY);saveData(DATA);go("home");}
function resetConfig(){if(confirm("¿Borrar todo y volver a valores por defecto?")){DATA=JSON.parse(JSON.stringify(DEFAULT));saveData(DATA);go("config");}}

/* ---------- LOGIN ---------- */
function Login(){return `
<div class="min-h-screen flex items-center justify-center px-6">
  <div class="w-full max-w-md rounded-2xl border border-zinc-800 bg-zinc-900/60 p-8 glow">
    <button onclick="go('home')" class="text-xs text-zinc-500 mb-4">← Volver</button>
    <h2 class="text-2xl font-bold">${DATA.company.name}</h2>
    <p class="text-sm text-zinc-400 mb-6">Elige un rol para la demo</p>
    <div class="space-y-3">
      <button onclick="enter('employee')" class="w-full rounded-xl bg-indigo-600 hover:bg-indigo-700 py-3 font-medium">👤 Entrar como Empleado</button>
      <button onclick="enter('leader')" class="w-full rounded-xl bg-zinc-800 hover:bg-zinc-700 py-3 font-medium">👔 Entrar como Líder</button>
      <button onclick="enter('admin')" class="w-full rounded-xl bg-zinc-800 hover:bg-zinc-700 py-3 font-medium">🏢 Entrar como RRHH / Dirección</button>
    </div>
  </div>
</div>`;}
function enter(role){const names={employee:"Empleado",leader:"Líder de equipo",admin:DATA.company.contact};SESSION={role,name:names[role]};go("app");}

/* ---------- SHELL ---------- */
function Shell(){
  const nav={employee:[["chat","💬 Chat IA"],["scores","📈 Mis Scores"]],
    leader:[["heatmap","🔥 Heatmap"],["trends","📉 Tendencias"],["insights","💡 Insights"],["risk","⚠️ Riesgo"]],
    admin:[["exec","📊 Ejecutivo"],["roi","💰 ROI"],["insights","💡 Insights"]]}[SESSION.role];
  return `<div class="flex h-screen overflow-hidden">
  <aside class="w-60 border-r border-zinc-800 bg-zinc-900/50 flex flex-col">
    <div class="p-5 border-b border-zinc-800"><p class="font-bold">TUPARCH3™</p><p class="text-xs text-zinc-500">${DATA.company.name}</p></div>
    <nav class="flex-1 p-3 space-y-1">${nav.map(([k,l])=>`<button onclick="setTab('${k}')" id="tab-${k}" class="navbtn w-full text-left px-4 py-2.5 rounded-xl text-sm hover:bg-indigo-600/20">${l}</button>`).join("")}</nav>
    <div class="p-4 border-t border-zinc-800"><p class="text-sm font-medium">${SESSION.name}</p><p class="text-xs text-zinc-500 capitalize">${SESSION.role}</p><button onclick="go('home')" class="mt-3 text-xs text-rose-400">Salir →</button></div>
  </aside>
  <main id="main" class="flex-1 overflow-y-auto"></main></div>`;}

let currentTab,chartRef=null;
function mountApp(){setTab({employee:"chat",leader:"heatmap",admin:"exec"}[SESSION.role]);}
function setTab(t){if(chartRef){chartRef.destroy();chartRef=null;}currentTab=t;
  document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("bg-indigo-600","text-white"));
  const b=document.getElementById("tab-"+t);if(b)b.classList.add("bg-indigo-600","text-white");
  const v={chat:ChatV,scores:ScoresV,heatmap:HeatV,trends:TrendV,insights:InsV,risk:RiskV,exec:ExecV,roi:RoiV};
  document.getElementById("main").innerHTML=`<div class="fade-in p-6 md:p-10 max-w-5xl mx-auto">${v[t]()}</div>`;
  if(t==="chat")initChat();if(t==="trends")drawTrend();if(t==="exec")drawExec();}

/* ---------- VIEWS ---------- */
function ChatV(){return `<h2 class="text-2xl font-bold mb-1">TUPARCH3 Coach</h2><p class="text-sm text-zinc-400 mb-4">Conversación privada 🔒</p>
<div id="chatbox" class="rounded-2xl border border-zinc-800 bg-zinc-900/40 h-[55vh] overflow-y-auto p-4 space-y-3"></div>
<div class="mt-3 flex gap-2"><input id="msg" onkeydown="if(event.key==='Enter')sendMsg()" placeholder="¿Cómo te sientes hoy?" class="flex-1 rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3 text-sm"><button onclick="sendMsg()" class="rounded-xl bg-indigo-600 px-5">Enviar</button></div>`;}
let chatHistory=[];
function initChat(){chatHistory=[];bub("assistant","¡Hola! 👋 Soy tu coach de bienestar de "+DATA.company.name+". ¿Qué tal tu semana?");}
function bub(r,t,tp){const b=document.getElementById("chatbox");const me=r==="user";b.innerHTML+=`<div class="flex ${me?'justify-end':'justify-start'}"><div class="rounded-2xl px-4 py-3 max-w-[80%] text-sm ${me?'bg-indigo-600':'bg-zinc-800'}">${t}${tp?`<span class="block mt-1 text-[10px] uppercase opacity-50">${tp}</span>`:''}</div></div>`;b.scrollTop=b.scrollHeight;}
async function sendMsg(){const i=document.getElementById("msg");const t=i.value.trim();if(!t)return;i.value="";bub("user",t,classify(t));chatHistory.push({role:"user",content:t});const b=document.getElementById("chatbox");b.innerHTML+=`<div id="typ" class="text-zinc-500 text-sm animate-pulse pl-2">escribiendo…</div>`;b.scrollTop=b.scrollHeight;const r=await aiReply(t,chatHistory);document.getElementById("typ")?.remove();bub("assistant",r);chatHistory.push({role:"assistant",content:r});}

function gauge(l,v,inv){const g=inv?v<40:v>60,m=v>=40&&v<=60;const c=g?"emerald":m?"amber":"rose";return `<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><p class="text-sm text-zinc-400">${l}</p><p class="text-4xl font-bold text-${c}-500 mt-1">${v}<span class="text-zinc-600 text-lg">/100</span></p><div class="mt-3 h-2 rounded-full bg-zinc-800"><div class="h-2 rounded-full bg-${c}-500" style="width:${v}%"></div></div></div>`;}
function ScoresV(){const avg=Math.round(DATA.teams.reduce((a,t)=>a+t.workpulse,0)/DATA.teams.length);const bn=Math.round(DATA.teams.reduce((a,t)=>a+t.burnout,0)/DATA.teams.length);return `<h2 class="text-2xl font-bold mb-6">Mis Scores</h2><div class="grid md:grid-cols-2 gap-4 mb-6">${gauge("WorkPulse Index",avg)}${gauge("Riesgo Burnout",bn,true)}${gauge("Motivación",65)}${gauge("Satisfacción",70)}</div><div class="rounded-2xl border border-indigo-700 bg-indigo-950/30 p-6"><h3 class="font-semibold mb-2">💡 Recomendación</h3><p class="text-sm text-zinc-300">Bloquea 2 horas sin reuniones esta semana y haz un check-in con tu líder sobre prioridades.</p></div>`;}
function HeatV(){return `<h2 class="text-2xl font-bold mb-1">Heatmap de Equipos</h2><p class="text-sm text-zinc-400 mb-6">Datos agregados y anonimizados 🔒</p><div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">${DATA.teams.map(t=>{const c=t.burnout>65?"rose":t.burnout>45?"amber":"emerald";return `<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><div class="flex justify-between"><h3 class="font-semibold">${t.name}</h3><span class="text-xs text-zinc-500">${t.size}p</span></div><div class="mt-3 space-y-2 text-sm"><div><div class="flex justify-between"><span class="text-zinc-400">Pulse</span><span>${t.workpulse}</span></div><div class="h-1.5 bg-zinc-800 rounded-full mt-1"><div class="h-1.5 bg-indigo-500 rounded-full" style="width:${t.workpulse}%"></div></div></div><div><div class="flex justify-between"><span class="text-zinc-400">Burnout</span><span class="text-${c}-400">${t.burnout}</span></div><div class="h-1.5 bg-zinc-800 rounded-full mt-1"><div class="h-1.5 bg-${c}-500 rounded-full" style="width:${t.burnout}%"></div></div></div></div></div>`;}).join("")}</div>`;}
function RiskV(){return `<h2 class="text-2xl font-bold mb-6">Riesgo de Rotación</h2><div class="space-y-3">${[...DATA.teams].sort((a,b)=>b.retention-a.retention).map(t=>{const c=t.retention>50?"rose":t.retention>30?"amber":"emerald";return `<div class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-4 flex items-center gap-4"><span class="w-32 font-medium">${t.name}</span><div class="flex-1 h-2 bg-zinc-800 rounded-full"><div class="h-2 bg-${c}-500 rounded-full" style="width:${t.retention}%"></div></div><span class="text-${c}-400 font-semibold w-12 text-right">${t.retention}%</span></div>`;}).join("")}</div>`;}
function InsV(){return `<h2 class="text-2xl font-bold mb-6">Insights de IA</h2><div class="space-y-3">${DATA.insights.map(i=>{const c={critical:"rose",warning:"amber",info:"indigo"}[i.sev];return `<div class="rounded-2xl border border-${c}-700 bg-${c}-950/20 p-5"><span class="text-xs uppercase text-${c}-400 font-semibold">${i.sev}</span><h3 class="font-semibold mt-1">${i.title}</h3><p class="text-sm text-zinc-300 mt-1">${i.body}</p></div>`;}).join("")}</div>`;}
function TrendV(){return `<h2 class="text-2xl font-bold mb-6">Tendencias</h2><div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><canvas id="tc" height="110"></canvas></div>`;}
function drawTrend(){const ctx=document.getElementById("tc");if(!ctx)return;const base=Math.round(DATA.teams.reduce((a,t)=>a+t.workpulse,0)/DATA.teams.length);chartRef=new Chart(ctx,{type:"line",data:{labels:["S6","S7","S8","S9","S10","S11","S12"],datasets:[{label:"WorkPulse",data:[base+7,base+4,base-6,base,base-2,base+2,base],borderColor:"#6366f1",backgroundColor:"rgba(99,102,241,.15)",fill:true,tension:.4,pointRadius:4}]},options:{plugins:{legend:{labels:{color:"#a1a1aa"}}},scales:{y:{min:0,max:100,grid:{color:"#27272a"},ticks:{color:"#a1a1aa"}},x:{grid:{display:false},ticks:{color:"#a1a1aa"}}}});}
function ExecV(){const r=computeROI();const avg=Math.round(DATA.teams.reduce((a,t)=>a+t.workpulse,0)/DATA.teams.length);const crit=DATA.teams.filter(t=>t.burnout>60);return `<h2 class="text-2xl font-bold mb-6">Dashboard Ejecutivo · ${DATA.company.name}</h2><div class="grid md:grid-cols-4 gap-4 mb-8">${[["WorkPulse",avg,"indigo"],["Empleados",r.totalEmp,"zinc"],["Ahorro/año",fmt(r.savings),"emerald"],["ROI",r.roi+"%","emerald"]].map(([l,v,c])=>`<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><p class="text-xs text-zinc-400">${l}</p><p class="text-3xl font-bold text-${c}-400 mt-1">${v}</p></div>`).join("")}</div><div class="grid md:grid-cols-2 gap-4"><div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><h3 class="font-semibold mb-3">Burnout por equipo</h3><canvas id="ec" height="160"></canvas></div><div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><h3 class="font-semibold mb-2">📈 Predicción</h3><p class="text-sm text-zinc-400">Sin intervención: pérdidas estimadas <b class="text-rose-400">${fmt(r.turnoverCost*0.3)}</b> en 90 días.</p><h3 class="font-semibold mt-4 mb-2">🔥 Crítico</h3>${crit.length?crit.map(t=>`<p class="text-sm text-rose-400">${t.name} — ${t.burnout}/100</p>`).join(""):'<p class="text-sm text-emerald-400">Sin equipos críticos ✅</p>'}</div></div>`;}
function drawExec(){const ctx=document.getElementById("ec");if(!ctx)return;chartRef=new Chart(ctx,{type:"bar",data:{labels:DATA.teams.map(t=>t.name),datasets:[{data:DATA.teams.map(t=>t.burnout),backgroundColor:DATA.teams.map(t=>t.burnout>65?"#f43f5e":t.burnout>45?"#f59e0b":"#10b981")}]},options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,grid:{color:"#27272a"},ticks:{color:"#a1a1aa"}},x:{grid:{display:false},ticks:{color:"#a1a1aa"}}}});}
function RoiV(){const r=computeROI();return `<h2 class="text-2xl font-bold mb-1">ROI Financiero · ${DATA.company.name}</h2><p class="text-sm text-zinc-400 mb-6">Industria: ${DATA.company.industry} · ${r.totalEmp} empleados · rotación ${DATA.company.turnover}%</p><div class="grid md:grid-cols-3 gap-4 mb-6">${[["Costo Rotación",fmt(r.turnoverCost),"rose"],["Productividad Perdida",fmt(r.prodLoss),"amber"],["Ahorro Estimado/año",fmt(r.savings),"emerald"]].map(([l,v,c])=>`<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><p class="text-xs text-zinc-400">${l}</p><p class="text-2xl font-bold text-${c}-400 mt-1">${v}</p></div>`).join("")}</div><div class="rounded-2xl border border-emerald-700 bg-emerald-950/20 p-8 text-center"><p class="text-zinc-400">Retorno proyectado</p><p class="text-6xl font-bold text-emerald-400 mt-2">${r.roi}%</p><p class="text-sm text-zinc-400 mt-3">Por cada $1 invertido, ~$${(1+r.roi/100).toFixed(2)} en ahorro de rotación y productividad.</p></div>`;}

render("home");
</script>
</body>
</html>
