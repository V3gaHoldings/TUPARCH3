/* ============================================================
   TUPARCH3 — Chatbot IA que extrae datos reales → Dashboard
   Flujo: empleado conversa → IA responde + extrae métricas →
   se guardan → dashboard agregado (anonimizado) se llena solo
============================================================ */

/* ---------- ESTADO / PERSISTENCIA ---------- */
let KEY = localStorage.getItem('t3_key') || "";
function db(){ return JSON.parse(localStorage.getItem('t3_db') || '{"company":"Mi Empresa","records":[]}'); }
function saveDB(d){ localStorage.setItem('t3_db', JSON.stringify(d)); }
function pushRecord(r){ const d=db(); d.records.push(r); saveDB(d); }
let SESSION=null, CURRENT="home", chartRefs=[];

/* ---------- TEMAS ---------- */
const TOPICS={burnout:"Burnout",leadership:"Liderazgo",workload:"Carga laboral",motivation:"Motivación",communication:"Comunicación",balance:"Equilibrio vida-trabajo",growth:"Desarrollo"};

/* ============================================================
   MOTOR IA — responde humano + extrae datos estructurados
============================================================ */
async function aiTurn(message, history){
  if(KEY){
    try{
      // 1) Respuesta empática
      const chat = await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+KEY},
        body:JSON.stringify({model:"gpt-4o-mini",temperature:0.7,messages:[
          {role:"system",content:"Eres TUPARCH3 Coach, un asistente de bienestar laboral cálido y empático. NO eres terapeuta ni médico. Conversa de forma natural, breve (2-3 frases), haz preguntas abiertas para entender cómo se siente la persona en su trabajo respecto a estrés, carga, motivación, liderazgo y equilibrio. Termina a veces con una micro-recomendación accionable. Español."},
          ...history,{role:"user",content:message}]})});
      const cd=await chat.json();
      const reply=cd.choices[0].message.content;

      // 2) Extracción de datos (silenciosa)
      const ext = await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+KEY},
        body:JSON.stringify({model:"gpt-4o-mini",temperature:0,response_format:{type:"json_object"},messages:[
          {role:"system",content:`Analiza el mensaje del empleado en contexto laboral. Devuelve SOLO JSON:
{"stress":0-10,"motivation":0-10,"satisfaction":0-10,"burnout_risk":0-100,"topic":"burnout|leadership|workload|motivation|communication|balance|growth","sentiment":"positive|neutral|negative","confidence":0-1}
Si el mensaje no da info suficiente sobre algún campo, estima conservador (5 en escalas, 30 en burnout). confidence = qué tan claro fue el mensaje.`},
          {role:"user",content:message}]})});
      const ed=await ext.json();
      let data; try{ data=JSON.parse(ed.choices[0].message.content); }catch(e){ data=fallbackExtract(message); }
      return {reply, data};
    }catch(e){ return {reply:"⚠️ Hubo un problema con la conexión IA. Revisa tu clave en Configuración. Mientras, sigo en modo demo.", data:fallbackExtract(message)}; }
  }
  // MODO DEMO (sin clave) — respuesta + extracción por reglas
  return {reply:demoReply(message), data:fallbackExtract(message)};
}

/* ---------- Extracción por reglas (fallback / demo) ---------- */
function fallbackExtract(msg){
  const m=msg.toLowerCase();
  let stress=5,motivation=5,satisfaction=5,topic="communication",sentiment="neutral";
  const neg=/(estr|agot|cansad|quemad|hart|presi|agobi|abrumad|saturad|no puedo|demasiad|sobrecarg)/.test(m);
  const pos=/(bien|content|motivad|tranquil|gust|feliz|agradec|orgullos|disfrut)/.test(m);
  if(/(estr|agot|cansad|quemad|saturad|abrumad)/.test(m)){stress=8;topic="burnout";}
  if(/(carga|tarea|reuni|deadline|plazo|sobrecarg|demasiad)/.test(m)){stress=Math.max(stress,7);topic="workload";}
  if(/(jefe|lider|manager|supervisor|reconoc)/.test(m)){topic="leadership";}
  if(/(motiv|sentido|prop[oó]sito|aburri|ilusi)/.test(m)){topic="motivation";motivation=neg?3:6;}
  if(/(familia|casa|horario|desconect|equilibr|vida)/.test(m)){topic="balance";}
  if(/(crecer|aprend|carrera|ascens|desarroll)/.test(m)){topic="growth";}
  if(neg){sentiment="negative";motivation=Math.min(motivation,4);satisfaction=4;}
  if(pos){sentiment="positive";motivation=Math.max(motivation,7);satisfaction=8;stress=Math.min(stress,4);}
  const burnout_risk=Math.min(100,Math.round(stress*7 + (10-motivation)*3));
  return {stress,motivation,satisfaction,burnout_risk,topic,sentiment,confidence:0.6};
}
function demoReply(msg){
  const m=msg.toLowerCase();
  if(/(estr|agot|cansad|quemad|saturad)/.test(m))return "Lamento que te sientas así, gracias por la confianza. 🌿 ¿Qué es lo que más te está drenando energía esta semana? A veces nombrar lo concreto ya ayuda a recuperar control.";
  if(/(jefe|lider|manager|reconoc)/.test(m))return "Entiendo, la relación con el liderazgo pesa mucho. ¿Qué te gustaría recibir que hoy no estás recibiendo: claridad, reconocimiento o más autonomía?";
  if(/(carga|tarea|reuni|deadline)/.test(m))return "Suena a mucha carga sobre tus hombros. 💪 Si pudieras quitar UNA cosa de tu semana sin culpa, ¿cuál sería? Empecemos por ahí.";
  if(/(motiv|aburri|sentido)/.test(m))return "Es válido sentir que la motivación baja. 🎯 ¿Recuerdas un momento reciente donde tu trabajo se sintió valioso? Reconstruyamos ese 'por qué'.";
  if(/(bien|content|motivad|feliz|gust)/.test(m))return "¡Me alegra escuchar eso! 🙌 ¿Qué crees que está funcionando bien para que lo mantengas (y lo repitas) la próxima semana?";
  return "Gracias por compartirlo conmigo. 🙏 Cuéntame un poco más: ¿cómo te has sentido en general con tu trabajo estos últimos días?";
}

/* ============================================================
   ANALYTICS — agregados anonimizados (k≥4)
============================================================ */
function aggregate(){
  const recs=db().records;
  const byTeam={};
  recs.forEach(r=>{ (byTeam[r.team]=byTeam[r.team]||[]).push(r); });
  const teams=[];
  for(const [name,arr] of Object.entries(byTeam)){
    const n=arr.length;
    const avg=k=>Math.round(arr.reduce((a,x)=>a+x[k],0)/n);
    teams.push({name,size:new Set(arr.map(r=>r.user)).size, samples:n,
      workpulse:Math.round((avg('motivation')*0.4+avg('satisfaction')*0.4+(10-avg('stress'))*0.2)*10),
      burnout:avg('burnout_risk'),
      retention:Math.min(100,Math.round(avg('burnout_risk')*0.7+(10-avg('motivation'))*4)),
      anon:n<4 });
  }
  const topicCount={};
  recs.forEach(r=>{topicCount[r.topic]=(topicCount[r.topic]||0)+1;});
  return {teams,topicCount,total:recs.length,users:new Set(recs.map(r=>r.user)).size};
}
function genInsights(){
  const a=aggregate();const out=[];
  a.teams.filter(t=>!t.anon).sort((x,y)=>y.burnout-x.burnout).slice(0,3).forEach(t=>{
    if(t.burnout>65)out.push({sev:"critical",title:`Burnout alto en ${t.name}`,body:`Burnout ${t.burnout}/100 detectado en ${t.samples} interacciones. Riesgo de rotación ${t.retention}%. Requiere atención prioritaria.`});
    else if(t.burnout>45)out.push({sev:"warning",title:`Señales de alerta en ${t.name}`,body:`Burnout moderado (${t.burnout}/100). Monitorear carga y motivación.`});
    else out.push({sev:"info",title:`${t.name} en zona saludable`,body:`Bienestar estable (burnout ${t.burnout}/100). Replicar buenas prácticas.`});
  });
  const top=Object.entries(a.topicCount).sort((x,y)=>y[1]-x[1])[0];
  if(top)out.push({sev:"info",title:`Tema más frecuente: ${TOPICS[top[0]]||top[0]}`,body:`Mencionado en ${top[1]} conversaciones. Foco recomendado para iniciativas de RRHH.`});
  return out;
}
function computeROI(){
  const a=aggregate();const avgSalary=db().avgSalary||55000;const turnover=(db().turnover||18)/100;
  const totalEmp=Math.max(a.users, a.teams.reduce((s,t)=>s+t.size,0))||1;
  const totalSalary=totalEmp*avgSalary;
  const turnoverCost=totalSalary*turnover*0.75;
  const improvedCost=totalSalary*Math.max(turnover-0.05,0.04)*0.75;
  const savings=turnoverCost-improvedCost;
  const highRisk=a.teams.filter(t=>!t.anon&&t.burnout>65);
  const prodLoss=highRisk.reduce((s,t)=>s+t.size*avgSalary*0.12,0);
  const platformCost=totalEmp*1200; // costo realista SaaS → ROI creíble
  const estSavings=savings+prodLoss*0.5;
  const roi=platformCost?Math.round((estSavings-platformCost)/platformCost*100):0;
  return {turnoverCost:Math.round(turnoverCost),prodLoss:Math.round(prodLoss),savings:Math.round(estSavings),roi,totalEmp};
}
const fmt=n=>"$"+Math.round(n).toLocaleString('en-US');

/* ============================================================
   ROUTER
============================================================ */
function go(v){window.scrollTo(0,0);render(v);}
function render(v="home"){CURRENT=v;chartRefs.forEach(c=>c.destroy());chartRefs=[];
  const a=document.getElementById("app");let h="";
  if(v==="home")h=Home();else if(v==="login")h=Login();else if(v==="config")h=Config();
  else if(v==="app"){if(!SESSION){go("login");return;}h=Shell();}
  a.innerHTML=`<div class="fade-in">${h}</div>`;if(v==="app")mountApp();}

   VISTA CHAT (empleado) — el corazón del sistema
============================================================ */
function ChatV(){return `
<div class="flex items-center justify-between mb-1">
  <h2 class="text-2xl font-bold">Tu espacio de bienestar</h2>
  <span class="text-xs ${KEY?'text-emerald-400':'text-amber-400'}">${KEY?'● IA real activa':'● Modo demo'}</span>
</div>
<p class="text-sm text-zinc-400 mb-4">Conversación privada · tu líder nunca ve lo que escribes, solo datos agregados 🔒</p>
<div id="chatbox" class="rounded-2xl border border-zinc-800 bg-zinc-900/40 h-[55vh] overflow-y-auto p-4 space-y-3"></div>
<div class="mt-3 flex gap-2">
  <input id="msg" onkeydown="if(event.key==='Enter')sendMsg()" placeholder="Cuéntame cómo te sientes en el trabajo..." class="flex-1 rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
  <button id="sendBtn" onclick="sendMsg()" class="rounded-xl bg-indigo-600 hover:bg-indigo-700 px-5 font-medium">Enviar</button>
</div>
<p id="captured" class="text-[11px] text-zinc-600 mt-2"></p>`;}

let chatHistory=[];
function initChat(){chatHistory=[];bub("assistant",`¡Hola ${SESSION.name}! 👋 Soy tu coach de bienestar. Este es tu espacio seguro y privado. ¿Cómo ha sido tu semana en el trabajo?`);}
function bub(role,text,topic){const box=document.getElementById("chatbox");const me=role==="user";
  box.innerHTML+=`<div class="flex ${me?'justify-end':'justify-start'}"><div class="rounded-2xl px-4 py-3 max-w-[80%] text-sm leading-relaxed ${me?'bg-indigo-600':'bg-zinc-800'}">${text}${topic?`<span class="block mt-1.5 text-[10px] uppercase tracking-wide opacity-50">🏷️ ${TOPICS[topic]||topic}</span>`:''}</div></div>`;
  box.scrollTop=box.scrollHeight;}
function typing(on){const box=document.getElementById("chatbox");if(on){box.innerHTML+=`<div id="typ" class="flex justify-start"><div class="bg-zinc-800 rounded-2xl px-4 py-3 typing text-lg"><span>●</span><span>●</span><span>●</span></div></div>`;box.scrollTop=box.scrollHeight;}else document.getElementById("typ")?.remove();}

async function sendMsg(){
  const input=document.getElementById("msg");const text=input.value.trim();if(!text)return;
  input.value="";document.getElementById("sendBtn").disabled=true;
  bub("user",text);chatHistory.push({role:"user",content:text});
  typing(true);
  const {reply,data}=await aiTurn(text,chatHistory);
  typing(false);
  bub("assistant",reply,data.topic);
  chatHistory.push({role:"assistant",content:reply});
  // GUARDAR el dato extraído real
  pushRecord({user:SESSION.name,team:SESSION.team,ts:Date.now(),
    stress:data.stress,motivation:data.motivation,satisfaction:data.satisfaction,
    burnout_risk:data.burnout_risk,topic:data.topic,sentiment:data.sentiment});
  document.getElementById("captured").textContent=`✓ Señal registrada (anónima): ${TOPICS[data.topic]||data.topic} · sentimiento ${data.sentiment}`;
  document.getElementById("sendBtn").disabled=false;
}

/* ---------- MI RESUMEN (empleado) ---------- */
function MeV(){
  const mine=db().records.filter(r=>r.user===SESSION.name);
  if(!mine.length)return `<h2 class="text-2xl font-bold mb-4">Mi resumen</h2><p class="text-zinc-400">Aún no has conversado. Ve a 💬 Conversar para empezar.</p>`;
  const avg=k=>Math.round(mine.reduce((a,x)=>a+x[k],0)/mine.length);
  const wp=Math.round((avg('motivation')*0.4+avg('satisfaction')*0.4+(10-avg('stress'))*0.2)*10);
  const bn=avg('burnout_risk');
  return `<h2 class="text-2xl font-bold mb-6">Mi resumen personal</h2>
  <div class="grid md:grid-cols-2 gap-4 mb-6">${gauge("WorkPulse",wp)}${gauge("Riesgo Burnout",bn,true)}${gauge("Motivación",avg('motivation')*10)}${gauge("Satisfacción",avg('satisfaction')*10)}</div>
  <div class="rounded-2xl border border-indigo-700 bg-indigo-950/30 p-6"><h3 class="font-semibold mb-2">💡 Para ti</h3><p class="text-sm text-zinc-300">${bn>60?'Tu nivel de agotamiento es elevado. Esta semana prioriza descanso real: bloquea 2h sin reuniones y habla con tu líder sobre tu carga.':bn>40?'Vas razonablemente bien, pero cuida tu energía. Identifica qué tarea te drena más y busca reducirla.':'¡Buen estado de bienestar! Mantén lo que estás haciendo y cuida tus límites.'}</p></div>
  <p class="text-xs text-zinc-600 mt-4">Basado en ${mine.length} conversaciones tuyas. Privado y solo visible para ti.</p>`;}

/* ---------- VISTAS LÍDER / ADMIN ---------- */
function emptyState(){return `<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-10 text-center"><p class="text-zinc-400">📭 Aún no hay suficientes datos.</p><p class="text-xs text-zinc-600 mt-2">Los empleados deben conversar con el chatbot para generar señales. Entra como empleado y prueba.</p></div>`;}
function gauge(l,v,inv){const g=inv?v<40:v>60,m=v>=40&&v<=60;const c=g?"emerald":m?"amber":"rose";return `<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><p class="text-sm text-zinc-400">${l}</p><p class="text-4xl font-bold text-${c}-500 mt-1">${v}<span class="text-zinc-600 text-lg">/100</span></p><div class="mt-3 h-2 rounded-full bg-zinc-800"><div class="h-2 rounded-full bg-${c}-500" style="width:${Math.min(v,100)}%"></div></div></div>`;}

function HeatV(){const a=aggregate();if(!a.teams.length)return `<h2 class="text-2xl font-bold mb-6">Heatmap de Equipos</h2>${emptyState()}`;
  return `<h2 class="text-2xl font-bold mb-1">Heatmap de Equipos</h2><p class="text-sm text-zinc-400 mb-6">Datos extraídos de conversaciones reales · anonimizados (k≥4) 🔒</p>
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">${a.teams.map(t=>{if(t.anon)return `<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5 flex flex-col justify-center items-center text-center"><h3 class="font-semibold">${t.name}</h3><p class="text-xs text-zinc-500 mt-2">🔒 Datos ocultos</p><p class="text-[10px] text-zinc-600 mt-1">Menos de 4 personas. Se protege la privacidad.</p></div>`;const c=t.burnout>65?"rose":t.burnout>45?"amber":"emerald";return `<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><div class="flex justify-between"><h3 class="font-semibold">${t.name}</h3><span class="text-xs text-zinc-500">${t.size}p · ${t.samples} señales</span></div><div class="mt-3 space-y-2 text-sm"><div><div class="flex justify-between"><span class="text-zinc-400">WorkPulse</span><span>${t.workpulse}</span></div><div class="h-1.5 bg-zinc-800 rounded-full mt-1"><div class="h-1.5 bg-indigo-500 rounded-full" style="width:${t.workpulse}%"></div></div></div><div><div class="flex justify-between"><span class="text-zinc-400">Burnout</span><span class="text-${c}-400">${t.burnout}</span></div><div class="h-1.5 bg-zinc-800 rounded-full mt-1"><div class="h-1.5 bg-${c}-500 rounded-full" style="width:${t.burnout}%"></div></div></div></div></div>`;}).join("")}</div>`;}

function RiskV(){const a=aggregate();const vis=a.teams.filter(t=>!t.anon);if(!vis.length)return `<h2 class="text-2xl font-bold mb-6">Riesgo de Rotación</h2>${emptyState()}`;
  return `<h2 class="text-2xl font-bold mb-6">Riesgo de Rotación por Equipo</h2><div class="space-y-3">${vis.sort((a,b)=>b.retention-a.retention).map(t=>{const c=t.retention>50?"rose":t.retention>30?"amber":"emerald";return `<div class="rounded-xl border border-zinc-800 bg-zinc-900/40 p-4 flex items-center gap-4"><span class="w-32 font-medium">${t.name}</span><div class="flex-1 h-2 bg-zinc-800 rounded-full"><div class="h-2 bg-${c}-500 rounded-full" style="width:${t.retention}%"></div></div><span class="text-${c}-400 font-semibold w-12 text-right">${t.retention}%</span></div>`;}).join("")}</div>`;}

function TopicsV(){const a=aggregate();if(!a.total)return `<h2 class="text-2xl font-bold mb-6">Temas frecuentes</h2>${emptyState()}`;
  return `<h2 class="text-2xl font-bold mb-1">Temas más conversados</h2><p class="text-sm text-zinc-400 mb-6">Qué preocupa a la organización · extraído de ${a.total} conversaciones</p><div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><canvas id="topicChart" height="120"></canvas></div>`;}
function drawTopics(){const a=aggregate();const ctx=document.getElementById("topicChart");if(!ctx)return;const ent=Object.entries(a.topicCount).sort((x,y)=>y[1]-x[1]);
  chartRefs.push(new Chart(ctx,{type:"bar",data:{labels:ent.map(e=>TOPICS[e[0]]||e[0]),datasets:[{data:ent.map(e=>e[1]),backgroundColor:"#6366f1"}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:"#27272a"},ticks:{color:"#a1a1aa"}},y:{grid:{display:false},ticks:{color:"#a1a1aa"}}}}));}

function InsV(){const ins=genInsights();if(!ins.length)return `<h2 class="text-2xl font-bold mb-6">Insights de IA</h2>${emptyState()}`;
  return `<h2 class="text-2xl font-bold mb-1">Insights Automáticos</h2><p class="text-sm text-zinc-400 mb-6">Generados a partir de patrones reales en las conversaciones</p><div class="space-y-3">${ins.map(i=>{const c={critical:"rose",warning:"amber",info:"indigo"}[i.sev];return `<div class="rounded-2xl border border-${c}-700 bg-${c}-950/20 p-5"><span class="text-xs uppercase text-${c}-400 font-semibold">${i.sev}</span><h3 class="font-semibold mt-1">${i.title}</h3><p class="text-sm text-zinc-300 mt-1">${i.body}</p></div>`;}).join("")}</div>`;}

function ExecV(){const a=aggregate();if(!a.total)return `<h2 class="text-2xl font-bold mb-6">Dashboard Ejecutivo</h2>${emptyState()}`;
  const r=computeROI();const vis=a.teams.filter(t=>!t.anon);
  const avgWP=vis.length?Math.round(vis.reduce((s,t)=>s+t.workpulse,0)/vis.length):0;
  const crit=vis.filter(t=>t.burnout>60);
  return `<h2 class="text-2xl font-bold mb-6">Dashboard Ejecutivo · ${db().company}</h2>
  <div class="grid md:grid-cols-4 gap-4 mb-8">${[["WorkPulse Global",avgWP,"indigo"],["Empleados activos",a.users,"zinc"],["Ahorro estimado/año",fmt(r.savings),"emerald"],["ROI",r.roi+"%","emerald"]].map(([l,v,c])=>`<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><p class="text-xs text-zinc-400">${l}</p><p class="text-3xl font-bold text-${c}-400 mt-1">${v}</p></div>`).join("")}</div>
  <div class="grid md:grid-cols-2 gap-4"><div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><h3 class="font-semibold mb-3">Burnout por equipo</h3><canvas id="execChart" height="160"></canvas></div>
  <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6"><h3 class="font-semibold mb-2">📈 Predicción</h3><p class="text-sm text-zinc-400">Riesgo financiero por rotación no atendida: <b class="text-rose-400">${fmt(r.turnoverCost*0.3)}</b> próximos 90 días.</p><h3 class="font-semibold mt-4 mb-2">🔥 Riesgo crítico</h3>${crit.length?crit.map(t=>`<p class="text-sm text-rose-400">${t.name} — burnout ${t.burnout}/100</p>`).join(""):'<p class="text-sm text-emerald-400">Sin equipos en zona crítica ✅</p>'}</div></div>
  <p class="text-xs text-zinc-600 mt-4">Basado en ${a.total} conversaciones reales de ${a.users} empleados.</p>`;}
function drawExec(){const a=aggregate();const vis=a.teams.filter(t=>!t.anon);const ctx=document.getElementById("execChart");if(!ctx||!vis.length)return;
  chartRefs.push(new Chart(ctx,{type:"bar",data:{labels:vis.map(t=>t.name),datasets:[{data:vis.map(t=>t.burnout),backgroundColor:vis.map(t=>t.burnout>65?"#f43f5e":t.burnout>45?"#f59e0b":"#10b981")}]},options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,grid:{color:"#27272a"},ticks:{color:"#a1a1aa"}},x:{grid:{display:false},ticks:{color:"#a1a1aa"}}}}));}

function RoiV(){const a=aggregate();if(!a.total)return `<h2 class="text-2xl font-bold mb-6">ROI Financiero</h2>${emptyState()}`;
  const r=computeROI();return `<h2 class="text-2xl font-bold mb-1">ROI Financiero del Bienestar</h2><p class="text-sm text-zinc-400 mb-6">${r.totalEmp} empleados · salario prom. ${fmt(db().avgSalary)} · rotación ${db().turnover}%</p>
  <div class="grid md:grid-cols-3 gap-4 mb-6">${[["Costo rotación (riesgo)",fmt(r.turnoverCost),"rose"],["Productividad perdida",fmt(r.prodLoss),"amber"],["Ahorro estimado/año",fmt(r.savings),"emerald"]].map(([l,v,c])=>`<div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-5"><p class="text-xs text-zinc-400">${l}</p><p class="text-2xl font-bold text-${c}-400 mt-1">${v}</p></div>`).join("")}</div>
  <div class="rounded-2xl border border-emerald-700 bg-emerald-950/20 p-8 text-center"><p class="text-zinc-400">Retorno de inversión proyectado</p><p class="text-6xl font-bold text-emerald-400 mt-2">${r.roi}%</p><p class="text-sm text-zinc-400 mt-3">Por cada $1 invertido, ~$${(1+r.roi/100).toFixed(2)} en ahorro de rotación y productividad recuperada.</p></div>`;}

/* INIT */
render("home");
</script>
</body>
</html>
