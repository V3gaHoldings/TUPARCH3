<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUPARCH3 Workforce Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  body { background:#f8fafc; color:#0f172a; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .fade { animation:fadeUp .4s ease both; }

  /* LOGIN */
  #login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;
    background:linear-gradient(135deg,#0f172a,#1e1b4b,#0c4a6e); }
  .login-card { width:100%; max-width:400px; border-radius:16px; border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.06); backdrop-filter:blur(20px); padding:32px; }
  .logo { width:56px; height:56px; margin:0 auto 16px; border-radius:12px;
    background:linear-gradient(135deg,#4f46e5,#9333ea); display:flex; align-items:center; justify-content:center; }
  .login-card h1 { color:#fff; font-size:20px; text-align:center; }
  .login-card .sub { color:#94a3b8; font-size:13px; text-align:center; margin-bottom:28px; }
  .field label { color:#cbd5e1; font-size:12px; display:block; margin-bottom:4px; }
  .field input { width:100%; border-radius:8px; border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.05); padding:10px 12px; color:#fff; font-size:14px; margin-bottom:14px; }
  .field input:focus { outline:none; border-color:#6366f1; }
  .btn-primary { width:100%; border-radius:8px; border:none; cursor:pointer;
    background:linear-gradient(to right,#4f46e5,#9333ea); padding:11px; color:#fff; font-weight:600; font-size:14px; }
  .btn-primary:hover { opacity:.92; }
  .hint { color:#64748b; font-size:12px; text-align:center; margin-top:22px; }
  .err { color:#f87171; font-size:13px; margin-bottom:10px; display:none; }

  /* APP */
  #app { display:none; }
  .layout { display:flex; min-height:100vh; }
  .sidebar { width:240px; background:#fff; border-right:1px solid #e2e8f0; display:flex; flex-direction:column; }
  .sb-head { height:64px; display:flex; align-items:center; gap:10px; padding:0 20px; border-bottom:1px solid #e2e8f0; }
  .sb-logo { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,#4f46e5,#9333ea);
    display:flex; align-items:center; justify-content:center; }
  .sb-head b { font-size:14px; } .sb-head small { font-size:10px; color:#64748b; display:block; }
  nav { flex:1; padding:12px; }
  .navbtn { width:100%; text-align:left; border:none; cursor:pointer; background:none; border-radius:8px;
    padding:10px 12px; font-size:14px; font-weight:500; color:#64748b; margin-bottom:2px; }
  .navbtn:hover { background:#f1f5f9; }
  .navbtn.active { background:#eef2ff; color:#4f46e5; }
  .logout { margin:12px; border:none; cursor:pointer; background:none; border-radius:8px;
    padding:10px 12px; font-size:14px; color:#64748b; text-align:left; }
  .content { flex:1; display:flex; flex-direction:column; }
  .topbar { height:64px; background:#fff; border-bottom:1px solid #e2e8f0;
    display:flex; align-items:center; justify-content:flex-end; padding:0 24px; gap:16px; }
  main { flex:1; overflow-y:auto; padding:24px; }
  h2.title { font-size:24px; font-weight:700; }
  p.subtitle { font-size:14px; color:#64748b; margin:4px 0 24px; }

  .grid { display:grid; gap:16px; }
  .kpi { border-radius:12px; padding:20px; }
  .kpi .label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#64748b; }
  .kpi .val { font-size:28px; font-weight:700; margin-top:8px; }
  .kpi .sub { font-size:12px; color:#64748b; margin-top:4px; }
  .card { border-radius:12px; border:1px solid #e2e8f0; background:#fff; padding:20px; }
  .card h3 { font-size:14px; font-weight:600; margin-bottom:14px; }
  .barrow { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .barrow .name { width:110px; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bartrack { flex:1; height:8px; border-radius:4px; background:#f1f5f9; overflow:hidden; }
  .barfill { height:100%; border-radius:4px; background:linear-gradient(to right,#6366f1,#a855f7); }
  .barrow .pct { width:48px; text-align:right; font-size:13px; font-weight:600; }
  .row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; }
  .rank { color:#94a3b8; margin-right:8px; }
  .badge { border-radius:999px; padding:2px 10px; font-size:11px; font-weight:600; }
  .risk-item { display:flex; justify-content:space-between; align-items:center; border:1px solid #e2e8f0;
    border-radius:8px; padding:12px; margin-bottom:8px; }
  .insight { display:flex; gap:8px; background:#f8fafc; border-radius:8px; padding:12px; font-size:13px; margin-bottom:10px; }
  .dropzone { display:flex; flex-direction:column; align-items:center; gap:12px; border:2px dashed #cbd5e1;
    border-radius:12px; padding:40px; cursor:pointer; }
  .dropzone:hover { border-color:#6366f1; }
  .stat-box { background:#f8fafc; border-radius:8px; padding:12px; }
  .stat-box .l { font-size:11px; color:#64748b; } .stat-box .v { font-size:24px; font-weight:700; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card fade">
    <div class="logo">
      <svg width="28" height="28" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <h1>TUPARCH3&trade;</h1>
    <p class="sub">Workforce Intelligence Platform</p>
    <form id="loginForm">
      <div class="field">
        <label>Correo Corporativo</label>
        <input id="email" type="email" value="admin@empresa.com" autocomplete="username">
      </div>
      <div class="field">
        <label>Contraseña (cédula)</label>
        <input id="pass" type="password" value="1023456789" autocomplete="current-password">
      </div>
      <p class="err" id="loginErr"></p>
      <button class="btn-primary" type="submit">Iniciar Sesión</button>
    </form>
    <p class="hint">Demo: admin@empresa.com / 1023456789</p>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-head">
        <div class="sb-logo"><svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
        <div><b>TUPARCH3&trade;</b><small>Workforce Intelligence</small></div>
      </div>
      <nav id="nav"></nav>
      <button class="logout" id="logoutBtn">Cerrar Sesión</button>
    </aside>
    <div class="content">
      <div class="topbar"><span id="userName" style="font-size:14px;font-weight:500;"></span></div>
      <main id="main"></main>
    </div>
  </div>
</div>

<script>
"use strict";

/* ============ ESTADO ============ */
var DB = { employees: [], users: [] };
var CURRENT = null;

/* ============ HELPERS ============ */
function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[rand(0, arr.length - 1)]; }
function clamp(n, a, b) { a = (a === undefined ? 0 : a); b = (b === undefined ? 100 : b); return Math.max(a, Math.min(b, n)); }
function fmtCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0); }
function avg(arr, f) {
  if (!arr.length) return 0;
  var s = 0; for (var i = 0; i < arr.length; i++) s += (f(arr[i]) || 0);
  return Math.round(s / arr.length);
}
function activeEmp() { return DB.employees.filter(function (e) { return e.status === 'ACTIVO'; }); }
function riskStyle(l) {
  var m = { BAJO: 'color:#10b981;background:#10b98119', MEDIO: 'color:#f59e0b;background:#f59e0b19',
    ALTO: 'color:#f97316;background:#f9731619', CRITICO: 'color:#ef4444;background:#ef444419' };
  return m[l] || '';
}

/* ============ SCORES ============ */
function computeScores(e) {
  e.burnoutRisk = Math.round(clamp(e.stress * 0.6 + (100 - e.motivation) * 0.4));
  e.engagement = Math.round(clamp(e.motivation * 0.5 + e.satisfaction * 0.5));
  var risk = (e.stress / 100) * 18 + (e.burnoutRisk / 100) * 15 + ((100 - e.motivation) / 100) * 18 + ((100 - e.satisfaction) / 100) * 10;
  risk += clamp((e.absentDays / 30) * 100) / 100 * 10;
  if (e.salesGoal > 0) { var ach = e.salesAccumulated / e.salesGoal * 100; if (ach < 80) risk += ((80 - ach) / 80) * 10; }
  risk += ((100 - e.performance) / 100) * 8;
  e.retentionRisk = Math.round(clamp(risk));
  e.riskLevel = e.retentionRisk >= 75 ? 'CRITICO' : e.retentionRisk >= 50 ? 'ALTO' : e.retentionRisk >= 30 ? 'MEDIO' : 'BAJO';
}

/* ============ SEED DEMO ============ */
function seedDemo() {
  var regs = ['Bogotá', 'Medellín', 'Cali', 'Barranquilla'];
  var areas = ['Comercial', 'Operaciones', 'Marketing', 'Servicio'];
  var cargos = ['Asesor', 'Ejecutivo', 'Coordinador', 'Gerente'];
  var motivos = ['Mejor oferta laboral', 'Estrés', 'Falta de crecimiento', 'Salario', 'Liderazgo deficiente'];

  DB = { employees: [], users: [] };
  DB.users.push({ email: 'admin@empresa.com', pass: '1023456789', role: 'ADMIN', name: 'Administrador' });
  DB.users.push({ email: 'rrhh@empresa.com', pass: '1023456789', role: 'RRHH', name: 'Talento Humano' });

  var leaders = [];
  for (var i = 0; i < 4; i++) {
    var ced = '100' + rand(1000000, 9999999);
    var email = 'lider' + i + '@empresa.com';
    var L = {
      id: 'L' + i, fullName: 'Líder ' + (i + 1), cedula: ced, email: email,
      regional: regs[i], area: pick(areas), team: 'Dirección', position: 'Gerente', city: regs[i],
      managerEmail: null, managerName: '', status: 'ACTIVO', hireDate: '2019-01-01', exitDate: null, exitReason: null,
      baseSalary: 8000000, salesGoal: 100000000, salesAccumulated: rand(70, 110) * 1000000,
      absentDays: rand(0, 8), performance: rand(70, 95), isCritical: true,
      replacementCost: 25000000, trainingCost: 8000000, replTime: 90,
      stress: rand(20, 60), motivation: rand(60, 95), satisfaction: rand(60, 90)
    };
    computeScores(L);
    DB.employees.push(L);
    DB.users.push({ email: email, pass: ced, role: 'LIDER', name: L.fullName });
    leaders.push(L);
  }

  for (var j = 0; j < 80; j++) {
    var ced2 = '' + rand(1000000000, 1099999999);
    var email2 = 'colab' + j + '@empresa.com';
    var lead = pick(leaders);
    var retired = Math.random() < 0.15;
    var goal = rand(20, 60) * 1000000;
    var E = {
      id: 'E' + j, fullName: 'Colaborador ' + (j + 1), cedula: ced2, email: email2,
      regional: lead.regional, area: lead.area, team: 'Equipo ' + rand(1, 3), position: pick(cargos), city: lead.regional,
      managerEmail: lead.email, managerName: lead.fullName,
      status: retired ? 'RETIRADO' : 'ACTIVO',
      hireDate: rand(2018, 2023) + '-06-15',
      exitDate: retired ? '2024-06-15' : null,
      exitReason: retired ? pick(motivos) : null,
      baseSalary: rand(1500, 4000) * 1000, salesGoal: goal,
      salesAccumulated: Math.round(goal * (rand(50, 120) / 100)),
      absentDays: rand(0, 25), performance: rand(40, 98), isCritical: Math.random() < 0.2,
      replacementCost: rand(5, 20) * 1000000, trainingCost: rand(2, 6) * 1000000, replTime: rand(30, 120),
      stress: rand(20, 90), motivation: rand(30, 95), satisfaction: rand(40, 90)
    };
    computeScores(E);
    DB.employees.push(E);
    DB.users.push({ email: email2, pass: ced2, role: 'COLABORADOR', name: E.fullName });
  }
  saveDB();
}

function saveDB() { try { localStorage.setItem('t3db', JSON.stringify(DB)); } catch (e) {} }
function loadDB() {
  try { var d = localStorage.getItem('t3db'); if (d) DB = JSON.parse(d); } catch (e) {}
  if (!DB.employees || !DB.employees.length) seedDemo();
}

/* ============ MÉTRICAS ============ */
function mWorkforceHealth() {
  var a = activeEmp();
  return {
    health: avg(a, function (e) { return 100 - e.stress * 0.4 + e.engagement * 0.6 - 30; }),
    motivation: avg(a, function (e) { return e.motivation; }),
    stress: avg(a, function (e) { return e.stress; }),
    burnout: avg(a, function (e) { return e.burnoutRisk; }),
    satisfaction: avg(a, function (e) { return e.satisfaction; }),
    engagement: avg(a, function (e) { return e.engagement; }),
    total: a.length
  };
}
function mCommercial() {
  var a = activeEmp().filter(function (e) { return e.salesGoal > 0; });
  function seg(key) {
    var g = {};
    a.forEach(function (e) {
      var k = e[key] || 'N/A';
      if (!g[k]) g[k] = { goal: 0, act: 0 };
      g[k].goal += e.salesGoal; g[k].act += e.salesAccumulated;
    });
    return Object.keys(g).map(function (k) {
      return { name: k, achievement: g[k].goal ? +(g[k].act / g[k].goal * 100).toFixed(1) : 0 };
    }).sort(function (x, y) { return y.achievement - x.achievement; });
  }
  var tg = 0, ta = 0;
  a.forEach(function (e) { tg += e.salesGoal; ta += e.salesAccumulated; });
  return { overall: tg ? +(ta / tg * 100).toFixed(1) : 0, totalGoal: tg, totalActual: ta,
    byRegional: seg('regional'), byArea: seg('area'), byTeam: seg('team'), byPosition: seg('position') };
}
function mTurnover() {
  var all = DB.employees;
  var ret = all.filter(function (e) { return e.status === 'RETIRADO'; });
  function period(months) {
    var cut = Date.now() - months * 30 * 864e5;
    var x = ret.filter(function (e) { return e.exitDate && new Date(e.exitDate).getTime() >= cut; }).length;
    var act = activeEmp().length || 1;
    return +(x / act * 100).toFixed(2);
  }
  var reasons = {};
  ret.forEach(function (e) { var r = e.exitReason || 'N/E'; reasons[r] = (reasons[r] || 0) + 1; });
  var causal = Object.keys(reasons).map(function (r) { return { reason: r, count: reasons[r] }; })
    .sort(function (a, b) { return b.count - a.count; });
  return { monthly: period(1), quarterly: period(3), annual: period(12), causal: causal };
}
function mFinancial() {
  var ret = DB.employees.filter(function (e) { return e.status === 'RETIRADO'; });
  var atRisk = activeEmp().filter(function (e) { return e.retentionRisk >= 50; });
  var repl = 0, train = 0, prod = 0, proj = 0;
  ret.forEach(function (e) { repl += e.replacementCost; train += e.trainingCost; prod += (e.baseSalary / 30) * e.replTime; });
  atRisk.forEach(function (e) { proj += (e.replacementCost + e.trainingCost) * (e.retentionRisk / 100); });
  var total = repl + train + prod;
  var roi = proj > 0 ? Math.round(((proj - proj * 0.15) / (proj * 0.15)) * 100) : 0;
  return { turnoverCost: total, replacementCost: repl, trainingCost: train, productivityLoss: prod,
    financialRisk: proj, economicImpact: total + proj, roi: roi, atRisk: atRisk.length };
}
function mInsights() {
  var e = activeEmp();
  function pearson(xs, ys) {
    var n = xs.length; if (n < 3) return 0;
    var mx = 0, my = 0; for (var i = 0; i < n; i++) { mx += xs[i]; my += ys[i]; } mx /= n; my /= n;
    var num = 0, dx = 0, dy = 0;
    for (var k = 0; k < n; k++) { num += (xs[k] - mx) * (ys[k] - my); dx += Math.pow(xs[k] - mx, 2); dy += Math.pow(ys[k] - my, 2); }
    return (dx && dy) ? +(num / Math.sqrt(dx * dy)).toFixed(2) : 0;
  }
  var stress = e.map(function (x) { return x.stress; });
  var mot = e.map(function (x) { return x.motivation; });
  var ach = e.map(function (x) { return x.salesGoal > 0 ? x.salesAccumulated / x.salesGoal * 100 : 0; });
  var ret = e.map(function (x) { return x.retentionRisk; });
  var abs = e.map(function (x) { return x.absentDays; });
  var out = [];
  var c1 = pearson(stress, ach); if (c1 < -0.15) out.push('Los colaboradores con altos niveles de estrés presentan una reducción promedio del ' + Math.abs(Math.round(c1 * 20)) + '% en cumplimiento de metas.');
  var c2 = pearson(mot, ret); if (c2 < -0.15) out.push('Los colaboradores con mayor motivación muestran menor intención de renuncia (correlación ' + c2 + ').');
  var c3 = pearson(stress, abs); if (c3 > 0.15) out.push('El estrés laboral se correlaciona con mayor ausentismo (' + c3 + ').');
  var c4 = pearson(mot, ach); if (c4 > 0.15) out.push('Mayor motivación se asocia con mejor cumplimiento comercial (' + c4 + ').');
  if (!out.length) out.push('Procesando datos para generar correlaciones estadísticas significativas.');
  return out;
}

/* ============ COMPONENTES UI ============ */
function kpi(title, val, sub, color) {
  var clr = { blue: '#3b82f6', green: '#10b981', amber: '#f59e0b', red: '#ef4444', purple: '#a855f7' }[color];
  return '<div class="kpi fade" style="border:1px solid ' + clr + '33;background:' + clr + '0d;">' +
    '<div class="label">' + title + '</div><div class="val">' + val + '</div>' +
    (sub ? '<div class="sub">' + sub + '</div>' : '') + '</div>';
}
function card(title, body) {
  return '<div class="card">' + (title ? '<h3>' + title + '</h3>' : '') + body + '</div>';
}
function bar(name, pct) {
  return '<div class="barrow"><span class="name">' + name + '</span>' +
    '<div class="bartrack"><div class="barfill" style="width:' + Math.min(pct, 100) + '%"></div></div>' +
    '<span class="pct">' + pct + '%</span></div>';
}

/* ============ VISTAS ============ */
var VIEWS = {
  executive: function () {
    var h = mWorkforceHealth(), c = mCommercial(), t = mTurnover(), f = mFinancial(), ins = mInsights();
    return '<h2 class="title">Dashboard Ejecutivo</h2><p class="subtitle">Inteligencia organizacional · ' + h.total + ' colaboradores activos</p>' +
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:24px;">' +
        kpi('Workforce Health', h.health, 'Salud organizacional', 'green') +
        kpi('Cumplimiento Comercial', c.overall + '%', fmtCOP(c.totalActual), 'blue') +
        kpi('Rotación Anual', t.annual + '%', 'Tasa acumulada', 'amber') +
        kpi('Impacto Económico', fmtCOP(f.economicImpact), f.atRisk + ' en riesgo', 'red') +
      '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' +
        card('Componentes de Salud',
          bar('Motivación', h.motivation) + bar('Satisfacción', h.satisfaction) +
          bar('Compromiso', h.engagement) + bar('Bajo Estrés', 100 - h.stress) + bar('Sin Burnout', 100 - h.burnout)) +
        card('🧠 Workforce Insights™', ins.map(function (i) { return '<div class="insight">✨ ' + i + '</div>'; }).join('')) +
      '</div>' +
      card('Cumplimiento por Regional', c.byRegional.slice(0, 6).map(function (r) { return bar(r.name, r.achievement); }).join(''));
  },

  commercial: function () {
    var c = mCommercial();
    return '<h2 class="title">Productividad Comercial</h2><p class="subtitle">Análisis de cumplimiento de metas</p>' +
      '<div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">' +
        kpi('Cumplimiento General', c.overall + '%', '', 'blue') +
        kpi('Meta Total', fmtCOP(c.totalGoal), '', 'purple') +
        kpi('Ventas Acumuladas', fmtCOP(c.totalActual), '', 'green') +
      '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' +
        card('Por Regional', c.byRegional.map(function (r) { return bar(r.name, r.achievement); }).join('')) +
        card('Por Área', c.byArea.map(function (r) { return bar(r.name, r.achievement); }).join('')) +
      '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;">' +
        card('Por Equipo', c.byTeam.map(function (r) { return bar(r.name, r.achievement); }).join('')) +
        card('Por Cargo', c.byPosition.map(function (r) { return bar(r.name, r.achievement); }).join('')) +
      '</div>';
  },

  hr: function () {
    var c = mCommercial();
    var leaderRank = DB.employees.filter(function (e) {
      return DB.employees.some(function (r) { return r.managerEmail === e.email; });
    }).map(function (l) {
      var team = DB.employees.filter(function (r) { return r.managerEmail === l.email && r.status === 'ACTIVO'; });
      return { name: l.fullName, score: avg(team, function (e) { return e.engagement; }), n: team.length };
    }).sort(function (a, b) { return b.score - a.score; });

    var heat = {};
    activeEmp().forEach(function (e) { var k = e.area || 'N/A'; if (!heat[k]) heat[k] = []; heat[k].push(e.stress); });

    return '<h2 class="title">Recursos Humanos</h2><p class="subtitle">Heatmaps · Rankings · Análisis de equipos</p>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:24px;">' +
        card('🏆 Ranking de Líderes', leaderRank.map(function (l, i) {
          return '<div class="row"><span><span class="rank">#' + (i + 1) + '</span>' + l.name + ' (' + l.n + ')</span><span style="font-weight:600;">' + l.score + '</span></div>';
        }).join('')) +
        card('🔥 Heatmap de Estrés por Área', Object.keys(heat).map(function (area) {
          var arr = heat[area]; var v = Math.round(arr.reduce(function (a, b) { return a + b; }, 0) / arr.length);
          var color = v > 60 ? '#ef4444' : v > 40 ? '#f59e0b' : '#10b981';
          return '<div class="barrow"><span class="name">' + area + '</span><div style="flex:1;height:24px;border-radius:4px;background:' + color + ';opacity:' + (0.3 + v / 150) + '"></div><span class="pct">' + v + '</span></div>';
        }).join('')) +
      '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;">' +
        card('✅ Equipos con Mejor Desempeño', c.byTeam.slice(0, 5).map(function (r) { return bar(r.name, r.achievement); }).join('')) +
        card('⚠️ Equipos en Riesgo', c.byTeam.slice().reverse().slice(0, 5).map(function (r) { return bar(r.name, r.achievement); }).join('')) +
      '</div>';
  },

  retention: function () {
    var t = mTurnover();
    var atRisk = activeEmp().filter(function (e) { return e.retentionRisk >= 50; })
      .sort(function (a, b) { return b.retentionRisk - a.retentionRisk; }).slice(0, 15);
    return '<h2 class="title">Retención &amp; Rotación</h2><p class="subtitle">Retention Risk Score™ · Predicción de abandono</p>' +
      '<div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">' +
        kpi('Rotación Mensual', t.monthly + '%', '', 'blue') +
        kpi('Rotación Trimestral', t.quarterly + '%', '', 'purple') +
        kpi('Rotación Anual', t.annual + '%', '', 'red') +
      '</div>' +
      '<div class="grid" style="grid-template-columns:1fr 1fr;">' +
        card('⚠️ Empleados en Riesgo', '<div style="max-height:400px;overflow-y:auto;">' + atRisk.map(function (e) {
          return '<div class="risk-item"><div><div style="font-size:13px;font-weight:500;">' + e.fullName + '</div><div style="font-size:11px;color:#64748b;">' + e.position + ' · ' + e.area + '</div></div>' +
            '<div style="display:flex;align-items:center;gap:12px;"><span class="badge" style="' + riskStyle(e.riskLevel) + '">' + e.riskLevel + '</span><span style="font-size:18px;font-weight:700;">' + e.retentionRisk + '</span></div></div>';
        }).join('') + '</div>') +
        card('📋 Ranking de Causales', t.causal.map(function (c, i) {
          return '<div class="row"><span><span class="rank">#' + (i + 1) + '</span>' + c.reason + '</span><span style="font-weight:600;">' + c.count + '</span></div>';
        }).join('')) +
      '</div>';
  },

  financial: function () {
    var f = mFinancial();
    return '<h2 class="title">Dashboard Financiero</h2><p class="subtitle">Impacto económico de la rotación</p>' +
      '<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:24px;">' +
        kpi('Costo de Rotación', fmtCOP(f.turnoverCost), '', 'red') +
        kpi('Costo de Reemplazo', fmtCOP(f.replacementCost), '', 'amber') +
        kpi('Costo Capacitación', fmtCOP(f.trainingCost), '', 'purple') +
        kpi('Productividad Perdida', fmtCOP(f.productivityLoss), '', 'blue') +
        kpi('Riesgo Financiero', fmtCOP(f.financialRisk), f.atRisk + ' empleados', 'red') +
        kpi('ROI de Retención', f.roi + '%', 'Retorno estimado', 'green') +
      '</div>' +
      card('Impacto Económico Total', '<p style="font-size:32px;font-weight:700;">' + fmtCOP(f.economicImpact) + '</p><p style="font-size:13px;color:#64748b;margin-top:8px;">Suma de costos de rotación histórica + riesgo proyectado de abandono.</p>');
  },

  coach: function () {
    setTimeout(scrollChat, 30);
    return '<div style="max-width:760px;margin:0 auto;">' +
      '<h2 class="title">TUPARCH3 AI Coach™</h2><p class="subtitle">Tu coach organizacional personal · Confidencial</p>' +
      '<div id="chatBox" style="height:50vh;overflow-y:auto;border:1px solid #e2e8f0;border-radius:12px;padding:16px;background:#fff;"></div>' +
      '<div style="display:flex;gap:8px;margin-top:12px;">' +
        '<input id="chatInput" placeholder="Escribe tu mensaje..." style="flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:12px;font-size:14px;">' +
        '<button id="chatSend" style="width:48px;border:none;border-radius:10px;background:#4f46e5;color:#fff;cursor:pointer;font-size:18px;">➤</button>' +
      '</div></div>';
  },

  import: function () {
    return '<div style="max-width:600px;margin:0 auto;">' +
      '<h2 class="title">Importación Masiva</h2><p class="subtitle">Carga Excel (.xlsx). Se crearán usuarios, organigrama y scores automáticamente.</p>' +
      card('', '<label class="dropzone"><svg width="40" height="40" fill="none" stroke="#6366f1" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>' +
        '<span id="fileName" style="font-size:14px;font-weight:500;">Selecciona archivo .xlsx</span>' +
        '<input id="fileInput" type="file" accept=".xlsx,.xls" style="display:none;"></label>' +
        '<button id="importBtn" class="btn-primary" style="margin-top:16px;opacity:.5;" disabled>Importar y Procesar</button>') +
      '<div id="importResult" style="margin-top:24px;"></div></div>';
  }
};

/* ============ NAVEGACIÓN ============ */
var NAV = [
  { id: 'executive', label: 'Dashboard Ejecutivo' },
  { id: 'commercial', label: 'Productividad Comercial' },
  { id: 'hr', label: 'Recursos Humanos' },
  { id: 'retention', label: 'Retención & Rotación' },
  { id: 'financial', label: 'Dashboard Financiero' },
  { id: 'coach', label: 'AI Coach™' },
  { id: 'import', label: 'Importar Datos' }
];

function renderNav() {
  var nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(function (i) {
    return '<button class="navbtn" data-view="' + i.id + '">' + i.label + '</button>';
  }).join('');
  var btns = nav.querySelectorAll('.navbtn');
  for (var k = 0; k < btns.length; k++) {
    btns[k].addEventListener('click', function () { go(this.getAttribute('data-view')); });
  }
}

function go(view) {
  var btns = document.querySelectorAll('.navbtn');
  for (var k = 0; k < btns.length; k++) {
    btns[k].classList.toggle('active', btns[k].getAttribute('data-view') === view);
  }
  document.getElementById('main').innerHTML = VIEWS[view]();
  if (view === 'coach') bindCoach();
  if (view === 'import') bindImport();
}

/* ============ AI COACH ============ */
var chatHistory = [{ role: 'assistant', content: 'Hola, soy TUPARCH3 AI Coach™. Estoy aquí para acompañarte en tu desarrollo y bienestar laboral. ¿En qué puedo ayudarte hoy?' }];

function scrollChat() {
  var box = document.getElementById('chatBox');
  if (!box) return;
  box.innerHTML = chatHistory.map(function (m) {
    var user = m.role === 'user';
    return '<div style="display:flex;justify-content:' + (user ? 'flex-end' : 'flex-start') + ';margin-bottom:12px;">' +
      '<div style="max-width:80%;border-radius:14px;padding:10px 14px;font-size:14px;background:' +
      (user ? '#4f46e5;color:#fff' : '#f1f5f9;color:#0f172a') + ';">' + m.content + '</div></div>';
  }).join('');
  box.scrollTop = box.scrollHeight;
}

function coachReply(msg) {
  var t = msg.toLowerCase();
  var r = {
    estres: 'Entiendo que sientes una carga importante. Validemos juntos: ¿qué situación específica te genera más presión esta semana? Te propongo identificar las 3 tareas de mayor impacto y bloquear 2 horas sin interrupciones. ¿Cuál sería la primera?',
    renuncia: 'Gracias por la confianza al compartirlo. Antes de cualquier decisión, analicemos: ¿qué te llevaría a quedarte y qué te empuja a salir? ¿Qué cambio concreto mejoraría tu situación actual?',
    motivacion: 'La motivación fluctúa, y reconocerlo es el primer paso. ¿Qué parte de tu trabajo te hacía sentir orgulloso hace unos meses? Recuperemos un pequeño logro diario. ¿Qué lograste hoy, por pequeño que sea?',
    liderazgo: 'El liderazgo impacta directamente el desempeño. ¿Qué comportamiento específico te gustaría cambiar en tu equipo o líder? Diseñemos una conversación asertiva. ¿Qué necesitas comunicar?',
    metas: 'Las metas pueden sentirse retadoras. ¿En qué etapa se estancan tus negocios? Enfócate en los 3 clientes con mayor probabilidad de cierre esta semana. ¿Quiénes son?',
    tiempo: 'Organizar el tiempo reduce el estrés. ¿Qué tarea importante pero no urgente estás postergando? Agéndala como primera del día. ¿Cuál es?',
    general: 'Gracias por compartirlo. Cuéntame un poco más: ¿qué te gustaría mejorar o resolver en tu día a día laboral? Estoy aquí para escucharte y construir contigo un plan de acción.'
  };
  if (/estr[eé]s|presi|agobi|satura/.test(t)) return r.estres;
  if (/renunci|irme|dejar|oferta/.test(t)) return r.renuncia;
  if (/motiva|desanim|sin ganas|aburri/.test(t)) return r.motivacion;
  if (/jefe|l[ií]der|equipo/.test(t)) return r.liderazgo;
  if (/meta|venta|objetivo|cumplim/.test(t)) return r.metas;
  if (/tiempo|organiz|prioriz/.test(t)) return r.tiempo;
  return r.general;
}

function bindCoach() {
  var send = document.getElementById('chatSend');
  var input = document.getElementById('chatInput');
  function doSend() {
    var msg = input.value.trim();
    if (!msg) return;
    chatHistory.push({ role: 'user', content: msg });
    input.value = '';
    scrollChat();
    setTimeout(function () {
      chatHistory.push({ role: 'assistant', content: coachReply(msg) });
      scrollChat();
    }, 500);
  }
  send.addEventListener('click', doSend);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSend(); });
}

/* ============ IMPORT EXCEL ============ */
var COLMAP = {
  'ID Empleado': 'id', 'Nombre Completo': 'fullName', 'Cédula': 'cedula', 'Correo Corporativo': 'email',
  'Ciudad': 'city', 'Regional': 'regional', 'Área': 'area', 'Equipo': 'team', 'Cargo': 'position',
  'Jefe Directo': 'managerName', 'Correo Jefe Directo': 'managerEmail', 'Fecha de Ingreso': 'hireDate',
  'Fecha de Retiro': 'exitDate', 'Estado': 'status', 'Salario Base Mensual': 'baseSalary',
  'Meta de Ventas Mensual': 'salesGoal', 'Ventas Acumuladas Mes': 'salesAccumulated',
  'Motivo de Retiro': 'exitReason', 'Días Ausentes Últimos 12 Meses': 'absentDays',
  'Evaluación de Desempeño': 'performance', 'Cargo Crítico': 'isCritical',
  'Costo de Reemplazo': 'replacementCost', 'Tiempo Promedio de Reemplazo': 'replTime',
  'Costo de Capacitación': 'trainingCost'
};
function num(v) { if (v == null || v === '') return 0; var n = Number(String(v).replace(/[^0-9.-]/g, '')); return isNaN(n) ? 0 : n; }
var pendingFile = null;

function bindImport() {
  var fi = document.getElementById('fileInput');
  var btn = document.getElementById('importBtn');
  fi.addEventListener('change', function (e) {
    pendingFile = e.target.files[0];
    document.getElementById('fileName').textContent = pendingFile ? pendingFile.name : 'Selecciona archivo .xlsx';
    btn.disabled = !pendingFile;
    btn.style.opacity = pendingFile ? '1' : '.5';
  });
  btn.addEventListener('click', function () {
    if (!pendingFile) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      var wb = XLSX.read(ev.target.result, { type: 'array' });
      var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      var created = 0, users = 0;
      rows.forEach(function (row) {
        var r = {};
        for (var c in COLMAP) r[COLMAP[c]] = row[c];
        if (!r.email || !r.cedula) return;
        var status = /retir/i.test(String(r.status)) ? 'RETIRADO' : 'ACTIVO';
        var e = {
          id: String(r.id || r.cedula), fullName: String(r.fullName || '').trim(),
          cedula: String(r.cedula).trim(), email: String(r.email).toLowerCase().trim(),
          city: r.city || '', regional: r.regional || '', area: r.area || '', team: r.team || '',
          position: r.position || '', managerName: r.managerName || '',
          managerEmail: r.managerEmail ? String(r.managerEmail).toLowerCase() : null,
          hireDate: r.hireDate || null, exitDate: r.exitDate || null, status: status,
          exitReason: r.exitReason || null, baseSalary: num(r.baseSalary), salesGoal: num(r.salesGoal),
          salesAccumulated: num(r.salesAccumulated), absentDays: num(r.absentDays),
          performance: r.performance ? num(r.performance) : 50,
          isCritical: /si|sí|true|1/i.test(String(r.isCritical)),
          replacementCost: num(r.replacementCost), trainingCost: num(r.trainingCost),
          replTime: num(r.replTime), stress: 30, motivation: 65, satisfaction: 65
        };
        computeScores(e);
        var idx = -1;
        for (var i = 0; i < DB.employees.length; i++) if (DB.employees[i].email === e.email) { idx = i; break; }
        if (idx >= 0) DB.employees[idx] = e; else { DB.employees.push(e); created++; }
        var hasUser = DB.users.some(function (u) { return u.email === e.email; });
        if (!hasUser) { DB.users.push({ email: e.email, pass: e.cedula, role: 'COLABORADOR', name: e.fullName }); users++; }
      });
      var mgrSet = {};
      DB.employees.forEach(function (e) { if (e.managerEmail) mgrSet[e.managerEmail] = true; });
      var leaders = 0;
      DB.users.forEach(function (u) { if (mgrSet[u.email] && u.role === 'COLABORADOR') { u.role = 'LIDER'; leaders++; } });
      saveDB();
      document.getElementById('importResult').innerHTML = card('✅ Importación Completada',
        '<div class="grid" style="grid-template-columns:1fr 1fr;">' +
        '<div class="stat-box"><div class="l">Empleados creados</div><div class="v">' + created + '</div></div>' +
        '<div class="stat-box"><div class="l">Usuarios creados</div><div class="v">' + users + '</div></div>' +
        '<div class="stat-box"><div class="l">Líderes detectados</div><div class="v">' + leaders + '</div></div>' +
        '<div class="stat-box"><div class="l">Total empleados</div><div class="v">' + DB.employees.length + '</div></div></div>');
    };
    reader.readAsArrayBuffer(pendingFile);
  });
}

/* ============ AUTH / INIT ============ */
function startApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userName').textContent = CURRENT.name;
  renderNav();
  go('executive');
}

function init() {
  loadDB();

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value.toLowerCase().trim();
    var pass = document.getElementById('pass').value;
    var u = null;
    for (var i = 0; i < DB.users.length; i++) {
      if (DB.users[i].email === email && DB.users[i].pass === pass) { u = DB.users[i]; break; }
    }
    var err = document.getElementById('loginErr');
    if (!u) { err.textContent = 'Credenciales inválidas'; err.style.display = 'block'; return; }
    CURRENT = u;
    startApp();
  });

  document.getElementById('logoutBtn').addEventListener('click', function () {
    CURRENT = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
  });
}

/* Arranque seguro: espera al DOM */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
