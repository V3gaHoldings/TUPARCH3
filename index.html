  * { font-family: 'Inter', sans-serif; }

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors">

     style="background:linear-gradient(135deg,#0f172a,#1e1b4b,#0c4a6e);">

    <form id="loginForm" class="space-y-4">

<!-- ============ APP ============ -->
<div id="app" class="hidden h-screen flex">
  <!-- Sidebar -->
  <aside id="sidebar" class="hidden lg:flex w-64 flex-col border-r border-slate-200 dark:border-slate-800 bg-white/60 dark:bg-slate-900/60 glass">
    <div class="flex h-16 items-center gap-2 border-b border-slate-200 dark:border-slate-800 px-6">
      <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-brand-600 to-purple-600 flex items-center justify-center">
        <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>

    </div>
    <nav id="nav" class="flex-1 space-y-1 p-3"></nav>
    <button onclick="logout()" class="m-3 flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Cerrar Sesión
    </button>

  <div class="flex flex-1 flex-col overflow-hidden">
    <header class="flex h-16 items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6">
      <button onclick="toggleSidebar()" class="lg:hidden"><svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <div></div>
      <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" class="rounded-lg p-2 hover:bg-slate-100 dark:hover:bg-slate-800">
          <svg id="themeIcon" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        </button>
        <span id="userName" class="text-sm font-medium"></span>
      </div>
    </header>
    <main id="main" class="flex-1 overflow-y-auto p-6"></main>
  </div>
</div>

<script>
/* ============================================================
   TUPARCH3 — Motor de datos, analítica e IA (cliente)
   ============================================================ */
const DB_KEY = 'tuparch3_db';
let DB = { employees: [], users: [], conversations: [] };
let CURRENT_USER = null;

/* ---------- Persistencia ---------- */
function saveDB(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
function loadDB(){ const d = localStorage.getItem(DB_KEY); if(d) DB = JSON.parse(d); }

/* ---------- Seed Demo ---------- */
function seedDemo(){
  const regionales=['Bogotá','Medellín','Cali','Barranquilla'];
  const areas=['Comercial','Operaciones','Marketing','Servicio'];
  const cargos=['Asesor','Ejecutivo','Coordinador','Gerente'];
  const motivos=['Mejor oferta laboral','Estrés','Falta de crecimiento','Salario','Liderazgo deficiente'];
  const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const pick=a=>a[rand(0,a.length-1)];

  DB={employees:[],users:[],conversations:[]};
  DB.users.push({email:'admin@empresa.com',pass:'1023456789',role:'ADMIN',name:'Administrador',mustChange:false,empId:null});
  DB.users.push({email:'rrhh@empresa.com',pass:'1023456789',role:'RRHH',name:'Talento Humano',mustChange:false,empId:null});

  const leaders=[];
  for(let i=0;i<4;i++){
    const ced=`100${rand(1000000,9999999)}`, email=`lider${i}@empresa.com`;
    const e={id:'L'+i,fullName:`Líder ${i+1}`,cedula:ced,email,regional:regionales[i],
      area:pick(areas),team:'Dirección',position:'Gerente',level:'Directivo',city:regionales[i],country:'Colombia',
      managerEmail:null,status:'ACTIVO',hireDate:'2019-01-01',exitDate:null,exitReason:null,
      baseSalary:8000000,salesGoal:100000000,salesAccumulated:rand(70,110)*1000000,
      numClients:rand(20,80),numDeals:rand(10,40),absentDays:rand(0,8),medicalLeaves:rand(0,2),
      performance:rand(70,95),isCritical:true,replacementCost:25000000,trainingCost:8000000,replTime:90,
      stress:rand(20,60),motivation:rand(60,95),satisfaction:rand(60,90)};
    computeScores(e); DB.employees.push(e); leaders.push(e);
    DB.users.push({email,pass:ced,role:'LIDER',name:e.fullName,mustChange:true,empId:e.id});
  }

  for(let i=0;i<80;i++){
    const ced=`${rand(1000000000,1099999999)}`, email=`colab${i}@empresa.com`;
    const leader=pick(leaders), retired=Math.random()<0.15, goal=rand(20,60)*1000000;
    const e={id:'E'+i,fullName:`Colaborador ${i+1}`,cedula:ced,email,
      regional:leader.regional,area:leader.area,team:`Equipo ${rand(1,3)}`,position:pick(cargos),level:'Profesional',
      city:leader.regional,country:'Colombia',managerEmail:leader.email,managerName:leader.fullName,
      status:retired?'RETIRADO':'ACTIVO',hireDate:`${rand(2018,2023)}-0${rand(1,9)}-15`,
      exitDate:retired?`2024-0${rand(1,9)}-15`:null,exitReason:retired?pick(motivos):null,
      baseSalary:rand(1500,4000)*1000,salesGoal:goal,salesAccumulated:Math.round(goal*(rand(50,120)/100)),
      numClients:rand(5,50),numDeals:rand(2,20),absentDays:rand(0,25),medicalLeaves:rand(0,5),
      performance:rand(40,98),isCritical:Math.random()<0.2,
      replacementCost:rand(5,20)*1000000,trainingCost:rand(2,6)*1000000,replTime:rand(30,120),
      stress:rand(20,90),motivation:rand(30,95),satisfaction:rand(40,90)};
    computeScores(e); DB.employees.push(e);
    DB.users.push({email,pass:ced,role:'COLABORADOR',name:e.fullName,mustChange:true,empId:e.id});
  }
  saveDB();
}

/* ---------- Motor de Scores ---------- */
const clamp=(n,a=0,b=100)=>Math.max(a,Math.min(b,n));
function computeScores(e){
  e.burnoutRisk=Math.round(clamp(e.stress*0.6+(100-e.motivation)*0.4));
  e.engagement=Math.round(clamp(e.motivation*0.5+e.satisfaction*0.5));
  let risk=0;
  risk+=(e.stress/100)*18;
  risk+=(e.burnoutRisk/100)*15;
  risk+=((100-e.motivation)/100)*18;
  risk+=((100-e.satisfaction)/100)*10;
  risk+=clamp((e.absentDays/30)*100)/100*10;
  if(e.salesGoal>0){const ach=(e.salesAccumulated/e.salesGoal)*100; if(ach<80)risk+=((80-ach)/80)*10;}
  if(e.performance!=null)risk+=((100-e.performance)/100)*8;
  if(e.hireDate){const yrs=(Date.now()-new Date(e.hireDate))/(365*864e5); if(yrs<1||yrs>7)risk+=5;}
  e.retentionRisk=Math.round(clamp(risk));
  e.attritionRisk=Math.round(clamp(risk*0.9));
  e.riskLevel=e.retentionRisk>=75?'CRITICO':e.retentionRisk>=50?'ALTO':e.retentionRisk>=30?'MEDIO':'BAJO';
}

/* ---------- Métricas Agregadas ---------- */
const active=()=>DB.employees.filter(e=>e.status==='ACTIVO');
const avg=(arr,f)=>arr.length?Math.round(arr.reduce((a,e)=>a+(f(e)||0),0)/arr.length):0;

function workforceHealth(){
  const a=active();
  return {
    health:avg(a,e=>100-e.stress*0.4+e.engagement*0.6-30),
    motivation:avg(a,e=>e.motivation),stress:avg(a,e=>e.stress),
    burnout:avg(a,e=>e.burnoutRisk),satisfaction:avg(a,e=>e.satisfaction),
    engagement:avg(a,e=>e.engagement),total:a.length
  };
}
function commercial(){
  const a=active().filter(e=>e.salesGoal>0);
  const seg=key=>{
    const g={};
    a.forEach(e=>{const k=e[key]||'N/A';g[k]??={goal:0,act:0,n:0};g[k].goal+=e.salesGoal;g[k].act+=e.salesAccumulated;g[k].n++;});
    return Object.entries(g).map(([name,v])=>({name,achievement:v.goal?+(v.act/v.goal*100).toFixed(1):0,n:v.n})).sort((x,y)=>y.achievement-x.achievement);
  };
  const tg=a.reduce((s,e)=>s+e.salesGoal,0), ta=a.reduce((s,e)=>s+e.salesAccumulated,0);
  return {overall:tg?+(ta/tg*100).toFixed(1):0,totalGoal:tg,totalActual:ta,
    byRegional:seg('regional'),byCity:seg('city'),byArea:seg('area'),byTeam:seg('team'),byPosition:seg('position'),byManager:seg('managerName')};
}
function turnover(){
  const all=DB.employees, ret=all.filter(e=>e.status==='RETIRADO'&&e.exitDate);
  const period=m=>{const cut=Date.now()-m*30*864e5;const x=ret.filter(e=>new Date(e.exitDate)>=cut).length;return +(x/(active().length||1)*100).toFixed(2);};
  const seg=key=>{const g={};all.forEach(e=>{const k=e[key]||'N/A';g[k]??={ex:0,t:0};g[k].t++;if(e.status==='RETIRADO')g[k].ex++;});return Object.entries(g).map(([name,v])=>({name,rate:+(v.ex/v.t*100).toFixed(1),ex:v.ex,t:v.t})).sort((a,b)=>b.rate-a.rate);};
  const reasons={};ret.forEach(e=>{const r=e.exitReason||'N/E';reasons[r]=(reasons[r]||0)+1;});
  return {monthly:period(1),quarterly:period(3),semiannual:period(6),annual:period(12),
    byCity:seg('city'),byRegional:seg('regional'),byArea:seg('area'),byPosition:seg('position'),
    causal:Object.entries(reasons).map(([reason,count])=>({reason,count})).sort((a,b)=>b.count-a.count)};
}
function financial(){
  const all=DB.employees,ret=all.filter(e=>e.status==='RETIRADO'),atRisk=active().filter(e=>e.retentionRisk>=50);
  const repl=ret.reduce((s,e)=>s+e.replacementCost,0),train=ret.reduce((s,e)=>s+e.trainingCost,0);
  const prodLoss=ret.reduce((s,e)=>s+(e.baseSalary/30)*e.replTime,0);
  const projRisk=atRisk.reduce((s,e)=>s+(e.replacementCost+e.trainingCost)*(e.retentionRisk/100),0);
  const total=repl+train+prodLoss;
  const roi=projRisk>0?Math.round(((projRisk-projRisk*0.15)/(projRisk*0.15))*100):0;
  return {turnoverCost:total,replacementCost:repl,trainingCost:train,productivityLoss:prodLoss,
    financialRisk:projRisk,economicImpact:total+projRisk,roi,atRisk:atRisk.length};
}
function correlations(){
  const e=active();
  const pearson=(xs,ys)=>{const n=xs.length;if(n<3)return 0;const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;let num=0,dx=0,dy=0;for(let i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my);dx+=(xs[i]-mx)**2;dy+=(ys[i]-my)**2;}return dx&&dy?+(num/Math.sqrt(dx*dy)).toFixed(2):0;};
  const stress=e.map(x=>x.stress),mot=e.map(x=>x.motivation),
    ach=e.map(x=>x.salesGoal>0?x.salesAccumulated/x.salesGoal*100:0),ret=e.map(x=>x.retentionRisk),abs=e.map(x=>x.absentDays);
  const ins=[];
  const cSA=pearson(stress,ach); if(cSA<-0.15)ins.push(`Los colaboradores con altos niveles de estrés presentan una reducción promedio del ${Math.abs(Math.round(cSA*20))}% en cumplimiento de metas.`);
  const cMR=pearson(mot,ret); if(cMR<-0.15)ins.push(`Los colaboradores con mayor motivación muestran menor intención de renuncia (correlación ${cMR}).`);
  const cSAbs=pearson(stress,abs); if(cSAbs>0.15)ins.push(`El estrés laboral se correlaciona con mayor ausentismo (${cSAbs}).`);
  const cMA=pearson(mot,ach); if(cMA>0.15)ins.push(`Mayor motivación se asocia con mejor cumplimiento comercial (${cMA}).`);
  if(!ins.length)ins.push('Cargando suficientes datos para generar correlaciones estadísticas significativas.');
  return ins;
}

/* ---------- Helpers UI ---------- */
const fmtCOP=n=>new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);
const riskColor=l=>({BAJO:'text-emerald-500 bg-emerald-500/10',MEDIO:'text-amber-500 bg-amber-500/10',ALTO:'text-orange-500 bg-orange-500/10',CRITICO:'text-red-500 bg-red-500/10'}[l]||'text-slate-500 bg-slate-500/10');

function kpi(title,value,sub,accent){
  const acc={blue:'from-blue-500/10 border-blue-500/20',green:'from-emerald-500/10 border-emerald-500/20',amber:'from-amber-500/10 border-amber-500/20',red:'from-red-500/10 border-red-500/20',purple:'from-purple-500/10 border-purple-500/20'}[accent];
  return `<div class="animate-fade rounded-xl border bg-gradient-to-br to-transparent ${acc} p-5 dark:bg-slate-900/40">
    <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">${title}</p>
    <p class="mt-2 text-3xl font-bold">${value}</p>
    ${sub?`<p class="mt-1 text-xs text-slate-500">${sub}</p>`:''}
  </div>`;
}
function card(title,body,extra=''){
  return `<div class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 ${extra}">
    ${title?`<div class="p-5 pb-2"><h3 class="text-sm font-semibold">${title}</h3></div>`:''}
    <div class="p-5 pt-2">${body}</div></div>`;
}
function bar(name,pct,n){
  return `<div class="flex items-center gap-3"><span class="w-28 truncate text-sm">${name}</span>
    <div class="flex-1 h-2 rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden">
      <div class="h-full rounded-full bg-gradient-to-r from-brand-500 to-purple-500" style="width:${Math.min(pct,100)}%"></div></div>
    <span class="w-12 text-right text-sm font-semibold">${pct}%</span></div>`;
}

/* ============================================================
   VISTAS
   ============================================================ */
let activeChart=null;
function destroyChart(){ if(activeChart){activeChart.destroy();activeChart=null;} }

const views={
  executive(){
    const h=workforceHealth(),c=commercial(),t=turnover(),f=financial(),ins=correlations();
    setTimeout(()=>renderRadar(h),50);
    return `<h1 class="text-2xl font-bold">Dashboard Ejecutivo</h1>
      <p class="text-sm text-slate-500 mb-6">Inteligencia organizacional · ${h.total} colaboradores activos</p>
      <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4 mb-6">
        ${kpi('Workforce Health',h.health,'Salud organizacional','green')}
        ${kpi('Cumplimiento Comercial',c.overall+'%',fmtCOP(c.totalActual),'blue')}
        ${kpi('Rotación Anual',t.annual+'%','Tasa acumulada','amber')}
        ${kpi('Impacto Económico',fmtCOP(f.economicImpact),f.atRisk+' en riesgo','red')}
      </div>
      <div class="grid gap-6 lg:grid-cols-3 mb-6">
        <div class="lg:col-span-2">${card('Workforce Health · Componentes','<canvas id="radar" height="260"></canvas>')}</div>
        ${card('🧠 Workforce Insights™','<ul class="space-y-3">'+ins.map(i=>`<li class="flex gap-2 rounded-lg bg-slate-50 dark:bg-slate-800/50 p-3 text-sm">✨ ${i}</li>`).join('')+'</ul>')}
      </div>
      ${card('Cumplimiento por Regional','<div class="space-y-3">'+c.byRegional.slice(0,6).map(r=>bar(r.name,r.achievement)).join('')+'</div>')}`;
  },

  commercial(){
    const c=commercial();
    const seg=(t,d)=>card(t,'<div class="space-y-3">'+d.slice(0,8).map(r=>bar(r.name,r.achievement)).join('')+'</div>');
    return `<h1 class="text-2xl font-bold">Productividad Comercial</h1>
      <p class="text-sm text-slate-500 mb-6">Análisis de cumplimiento de metas</p>
      <div class="grid gap-4 md:grid-cols-3 mb-6">
        ${kpi('Cumplimiento General',c.overall+'%','','blue')}
        ${kpi('Meta Total',fmtCOP(c.totalGoal),'','purple')}
        ${kpi('Ventas Acumuladas',fmtCOP(c.totalActual),'','green')}
      </div>
      <div class="grid gap-6 lg:grid-cols-2 mb-6">${seg('Por Regional',c.byRegional)}${seg('Por Área',c.byArea)}</div>
      <div class="grid gap-6 lg:grid-cols-2 mb-6">${seg('Por Equipo',c.byTeam)}${seg('Por Cargo',c.byPosition)}</div>
      ${seg('Por Jefe Directo',c.byManager)}`;
  },

  hr(){
    const t=turnover(),c=commercial();
    const a=active().slice().sort((x,y)=>y.engagement-x.engagement);
    const topTeams=c.byTeam.slice(0,5),riskTeams=[...c.byTeam].sort((x,y)=>x.achievement-y.achievement).slice(0,5);
    const leaderRank=DB.employees.filter(e=>DB.employees.some(r=>r.managerEmail===e.email))
      .map(l=>{const team=DB.employees.filter(r=>r.managerEmail===l.email&&r.status==='ACTIVO');
        return{name:l.fullName,score:avg(team,e=>e.engagement),n:team.length};}).sort((x,y)=>y.score-x.score);
    const heat=DB.employees.reduce((m,e)=>{const k=e.area||'N/A';m[k]??=[];if(e.status==='ACTIVO')m[k].push(e.stress);return m;},{});
    return `<h1 class="text-2xl font-bold">Recursos Humanos</h1>
      <p class="text-sm text-slate-500 mb-6">Heatmaps · Rankings · Análisis de equipos</p>
      <div class="grid gap-6 lg:grid-cols-2 mb-6">
        ${card('🏆 Ranking de Líderes','<div class="space-y-2">'+leaderRank.map((l,i)=>`<div class="flex justify-between text-sm"><span><span class="text-slate-400 mr-2">#${i+1}</span>${l.name} <span class="text-slate-400">(${l.n})</span></span><span class="font-semibold">${l.score}</span></div>`).join('')+'</div>')}
        ${card('🔥 Heatmap de Estrés por Área','<div class="space-y-2">'+Object.entries(heat).map(([area,arr])=>{const v=avg(arr.map(s=>({stress:s})),e=>e.stress)||(arr.reduce((a,b)=>a+b,0)/arr.length||0);const color=v>60?'bg-red-500':v>40?'bg-amber-500':'bg-emerald-500';return `<div class="flex items-center gap-3"><span class="w-28 text-sm">${area}</span><div class="flex-1 h-6 rounded ${color}" style="opacity:${0.3+v/150}"></div><span class="w-10 text-right text-sm font-semibold">${Math.round(v)}</span></div>`;}).join('')+'</div>')}
      </div>
      <div class="grid gap-6 lg:grid-cols-2">
        ${card('✅ Equipos con Mejor Desempeño','<div class="space-y-3">'+topTeams.map(r=>bar(r.name,r.achievement)).join('')+'</div>')}
        ${card('⚠️ Equipos en Riesgo','<div class="space-y-3">'+riskTeams.map(r=>bar(r.name,r.achievement)).join('')+'</div>')}
      </div>`;
  },

  destroyChart();
  const ctx=document.getElementById('radar'); if(!ctx)return;
  const dark=document.documentElement.classList.contains('dark');
  activeChart=new Chart(ctx,{type:'radar',data:{labels:['Motivación','Satisfacción','Compromiso','Bajo Estrés','Sin Burnout'],

    options:{plugins:{legend:{display:false}},scales:{r:{min:0,max:100,grid:{color:dark?'#334155':'#e2e8f0'},pointLabels:{color:dark?'#94a3b8':'#475569'},ticks:{display:false}}}}});

/* ---------- AI Coach (local inteligente) ---------- */
const chatHistory=[{role:'assistant',content:'Hola, soy TUPARCH3 AI Coach™. Estoy aquí para acompañarte en tu desarrollo y bienestar laboral. ¿En qué puedo ayudarte hoy?'}];
function scrollChat(){
  const box=document.getElementById('chatBox'); if(!box)return;
  box.innerHTML=chatHistory.map(m=>`<div class="flex ${m.role==='user'?'justify-end':'justify-start'} animate-fade"><div class="max-w-[80%] rounded-2xl px-4 py-3 text-sm ${m.role==='user'?'bg-brand-600 text-white':'bg-slate-100 dark:bg-slate-800'}">${m.content}</div></div>`).join('');
  box.scrollTop=box.scrollHeight;
}
function coachReply(msg){
  const t=msg.toLowerCase();
  // Clasificación local
  let cat='General';
  if(/estr[eé]s|presi[oó]n|agobi|saturad/.test(t))cat='Estrés';
  else if(/renunci|irme|dejar|otra empresa|oferta/.test(t))cat='Intención de renuncia';
  else if(/motivaci|desanim|sin ganas|aburri/.test(t))cat='Motivación';
  else if(/jefe|l[ií]der|equipo/.test(t))cat='Liderazgo';
  else if(/meta|venta|cumplimiento|objetivo/.test(t))cat='Metas comerciales';
  else if(/tiempo|organiz|prioriz/.test(t))cat='Gestión del tiempo';
  else if(/reconoc|valorad/.test(t))cat='Reconocimiento';

  const replies={
    'Estrés':'Entiendo que estás sintiendo una carga importante. Validemos juntos: ¿qué situación específica te genera más presión esta semana? Como coach te propongo una micro-acción: identifica las 3 tareas de mayor impacto y bloquea 2 horas sin interrupciones para ellas. ¿Cuál sería la primera?',
    'Intención de renuncia':'Gracias por la confianza al compartirlo. Antes de cualquier decisión, hagamos un análisis claro: ¿qué es exactamente lo que te llevaría a quedarte y qué te empuja a salir? Listemos pros y contras objetivos. ¿Qué cambio concreto mejoraría tu situación actual?',
    'Motivación':'La motivación fluctúa, y reconocerlo es el primer paso. Conectemos con tu propósito: ¿qué parte de tu trabajo te hacía sentir orgulloso hace unos meses? Te propongo recuperar un pequeño logro diario y registrarlo. ¿Qué logro tuviste hoy, por pequeño que sea?',
    'Liderazgo':'El liderazgo impacta directamente el desempeño del equipo. Profundicemos: ¿qué comportamiento específico de tu líder o tu equipo te gustaría cambiar? Diseñemos una conversación asertiva. ¿Qué necesitas comunicar y qué resultado buscas?',
    'Metas comerciales':'Las metas pueden sentirse retadoras. Analicemos tu pipeline: ¿en qué etapa se estancan tus negocios? Construyamos un plan de acción: enfócate en los 3 clientes con mayor probabilidad de cierre esta semana. ¿Quiénes son?',
    'Gestión del tiempo':'Organizar el tiempo es clave para reducir el estrés. Apliquemos la matriz urgente/importante: ¿qué tarea estás postergando que es importante pero no urgente? Agéndala como primera del día. ¿Cuál es?',
    'Reconocimiento':'Sentirse reconocido impacta el compromiso. Mientras gestionamos eso, también es valioso reconocer tu propio avance. ¿Qué resultado lograste recientemente del que te sientas orgulloso? Y, ¿has compartido tus logros con tu líder?',
    'General':'Gracias por compartirlo. Cuéntame un poco más para acompañarte mejor: ¿qué te gustaría mejorar o resolver en tu día a día laboral? Estoy aquí para escucharte, analizar la situación y construir contigo un plan de acción.'
  };
  return {reply:replies[cat],category:cat};
}
function sendChat(){
  const inp=document.getElementById('chatInput'); const msg=inp.value.trim(); if(!msg)return;
  chatHistory.push({role:'user',content:msg}); inp.value=''; scrollChat();
  setTimeout(()=>{
    const {reply,category}=coachReply(msg);
    chatHistory.push({role:'assistant',content:reply});
    // Guardar conversación clasificada
    DB.conversations.push({empId:CURRENT_USER.empId,category,msg,time:Date.now()});
    saveDB(); scrollChat();
  },600);
}

/* ---------- Importación Excel ---------- */
let pendingFile=null;
function onFile(e){pendingFile=e.target.files[0];document.getElementById('fileName').textContent=pendingFile?.name||'Selecciona archivo';document.getElementById('importBtn').disabled=!pendingFile;}
const COLMAP={'ID Empleado':'id','Nombre Completo':'fullName','Cédula':'cedula','Correo Corporativo':'email','Teléfono':'phone','Ciudad':'city','País':'country','Regional':'regional','Área':'area','Equipo':'team','Cargo':'position','Nivel de Cargo':'level','Jefe Directo':'managerName','Correo Jefe Directo':'managerEmail','Fecha de Ingreso':'hireDate','Fecha de Retiro':'exitDate','Estado':'status','Salario Base Mensual':'baseSalary','Meta de Ventas Mensual':'salesGoal','Ventas Acumuladas Mes':'salesAccumulated','Número de Clientes':'numClients','Número de Negocios Cerrados':'numDeals','Motivo de Retiro':'exitReason','Días Ausentes Últimos 12 Meses':'absentDays','Incapacidades Últimos 12 Meses':'medicalLeaves','Evaluación de Desempeño':'performance','Cargo Crítico':'isCritical','Costo de Reemplazo':'replacementCost','Tiempo Promedio de Reemplazo':'replTime','Costo de Capacitación':'trainingCost'};
const N=v=>v==null||v===''?0:Number(String(v).replace(/[^0-9.-]/g,''))||0;
function processFile(){
  if(!pendingFile)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    let created=0,users=0;
    rows.forEach(row=>{
      const r={}; for(const[c,f]of Object.entries(COLMAP))r[f]=row[c];
      if(!r.email||!r.cedula)return;
      const status=/retir/i.test(r.status)?'RETIRADO':'ACTIVO';
      const e={id:String(r.id||r.cedula),fullName:String(r.fullName).trim(),cedula:String(r.cedula).trim(),
        email:String(r.email).toLowerCase().trim(),city:r.city||'',country:r.country||'Colombia',
        regional:r.regional||'',area:r.area||'',team:r.team||'',position:r.position||'',level:r.level||'',
        managerName:r.managerName||'',managerEmail:r.managerEmail?String(r.managerEmail).toLowerCase():null,
        hireDate:r.hireDate?new Date(r.hireDate).toISOString().slice(0,10):null,
        exitDate:r.exitDate?new Date(r.exitDate).toISOString().slice(0,10):null,
        status,exitReason:r.exitReason||null,baseSalary:N(r.baseSalary),salesGoal:N(r.salesGoal),
        salesAccumulated:N(r.salesAccumulated),numClients:N(r.numClients),numDeals:N(r.numDeals),
        absentDays:N(r.absentDays),medicalLeaves:N(r.medicalLeaves),performance:r.performance?N(r.performance):50,
        isCritical:/si|sí|true|1/i.test(String(r.isCritical)),replacementCost:N(r.replacementCost),
        replTime:N(r.replTime),trainingCost:N(r.trainingCost),
        stress:30,motivation:65,satisfaction:65};
      computeScores(e);
      const idx=DB.employees.findIndex(x=>x.email===e.email);
      if(idx>=0)DB.employees[idx]=e; else{DB.employees.push(e);created++;}
      if(!DB.users.some(u=>u.email===e.email)){
        DB.users.push({email:e.email,pass:e.cedula,role:'COLABORADOR',name:e.fullName,mustChange:true,empId:e.id});
        users++;
      }
    });
    // Detectar líderes
    const mgrEmails=new Set(DB.employees.map(e=>e.managerEmail).filter(Boolean));
    let leaders=0;
    DB.users.forEach(u=>{if(mgrEmails.has(u.email)&&u.role==='COLABORADOR'){u.role='LIDER';leaders++;}});
    saveDB();
    document.getElementById('importResult').innerHTML=card('✅ Importación Completada',
      `<div class="grid grid-cols-2 gap-4 text-sm">
        <div class="rounded-lg bg-slate-50 dark:bg-slate-800/50 p-3"><p class="text-xs text-slate-500">Empleados creados</p><p class="text-2xl font-bold">${created}</p></div>
        <div class="rounded-lg bg-slate-50 dark:bg-slate-800/50 p-3"><p class="text-xs text-slate-500">Usuarios creados</p><p class="text-2xl font-bold">${users}</p></div>
        <div class="rounded-lg bg-slate-50 dark:bg-slate-800/50 p-3"><p class="text-xs text-slate-500">Líderes detectados</p><p class="text-2xl font-bold">${leaders}</p></div>
        <div class="rounded-lg bg-slate-50 dark:bg-slate-800/50 p-3"><p class="text-xs text-slate-500">Total empleados</p><p class="text-2xl font-bold">${DB.employees.length}</p></div>
      </div>`);
  };
  reader.readAsArrayBuffer(pendingFile);
}

function renderNav(){

function go(view){
  destroyChart();
  document.querySelectorAll('.navbtn').forEach(b=>{
    const on=b.dataset.view===view;
    b.classList.toggle('bg-brand-500/10',on);b.classList.toggle('text-brand-600',on);
  });
  document.getElementById('main').innerHTML=views[view]();
  if(window.innerWidth<1024)document.getElementById('sidebar').classList.add('hidden');
}
function defaultView(){
  const r=CURRENT_USER.role;
  return(r==='COLABORADOR'||r==='LIDER')?'coach':'executive';
}

document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  const email=document.getElementById('loginEmail').value.toLowerCase().trim();
  const pass=document.getElementById('loginPass').value;
  const u=DB.users.find(x=>x.email===email&&x.pass===pass);
  const err=document.getElementById('loginError');
  if(!u){err.textContent='Credenciales inválidas';err.classList.remove('hidden');return;}
  CURRENT_USER=u; localStorage.setItem('tuparch3_session',email);
  startApp();
});
function startApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent=CURRENT_USER.name;
  renderNav(); go(defaultView());
}
function logout(){localStorage.removeItem('tuparch3_session');location.reload();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('hidden');}
function toggleTheme(){
  const html=document.documentElement;
  html.classList.toggle('dark'); html.classList.toggle('light');
  localStorage.setItem('tuparch3_theme',html.classList.contains('dark')?'dark':'light');
}

/* ---------- Init ---------- */
(function init(){
  if(localStorage.getItem('tuparch3_theme')==='dark'){document.documentElement.classList.add('dark');document.documentElement.classList.remove('light');}
  loadDB();
  if(!DB.employees.length)seedDemo();
  const sess=localStorage.getItem('tuparch3_session');
  if(sess){const u=DB.users.find(x=>x.email===sess);if(u){CURRENT_USER=u;startApp();}}
})();
