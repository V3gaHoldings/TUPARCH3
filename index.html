/* ---------- ROI ENGINE ---------- */
function computeROI(teams,avgSalary=55000){
  const totalEmp=teams.reduce((a,t)=>a+t.size,0);
  const totalSalary=totalEmp*avgSalary;
  const turnoverCost=totalSalary*0.18*0.75;
  const improvedCost=totalSalary*0.12*0.75;
  const savings=turnoverCost-improvedCost;
  const highRisk=teams.filter(t=>t.burnout>65);
  const prodLoss=highRisk.reduce((a,t)=>a+t.size*avgSalary*0.15,0);
  const platformCost=totalEmp*96;
  const estimatedSavings=savings+prodLoss*0.5;
  const roi=Math.round((estimatedSavings-platformCost)/platformCost*100);
  return{turnoverCost:Math.round(turnoverCost),prodLoss:Math.round(prodLoss),savings:Math.round(estimatedSavings),roi,totalEmp};
}
const fmt=n=>"$"+n.toLocaleString('en-US');

/* ---------- AI ENGINE ---------- */
async function aiReply(message,history){
  if(OPENAI_API_KEY){
    try{
      const res=await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENAI_API_KEY},
        body:JSON.stringify({model:"gpt-4o-mini",temperature:0.6,messages:[
          {role:"system",content:"Eres TUPARCH3 Coach, asistente de bienestar laboral. NO eres terapeuta. Enfócate en coaching: estrés, carga, motivación, liderazgo. Cálido, breve, accionable. En español."},
          ...history,{role:"user",content:message}]})});
      const d=await res.json();return d.choices[0].message.content;
    }catch(e){return "⚠️ Error de conexión IA. Revisa tu API key.";}
  }
  const m=message.toLowerCase();
  if(m.includes("estr")||m.includes("agobi")||m.includes("cansad"))
    return "Entiendo la presión que sientes. 🌿 Hagamos algo concreto: identifica las 3 tareas que más te drenan esta semana. ¿Cuál podrías delegar o aplazar 48h? Reducir carga inmediata baja el estrés más rápido que la fuerza de voluntad.";
  if(m.includes("jefe")||m.includes("lider")||m.includes("manager"))
    return "El liderazgo impacta mucho el bienestar. ¿Qué necesitas de tu líder que hoy no recibes: claridad, reconocimiento o autonomía? Te ayudo a preparar una conversación breve y clara.";
  if(m.includes("motiv")||m.includes("aburri")||m.includes("sentido"))
    return "La motivación cae cuando perdemos conexión con el propósito. 🎯 ¿Recuerdas un momento reciente donde tu trabajo se sintió valioso? Reconstruyamos ese 'por qué'.";
  return "Gracias por compartirlo. 🙏 ¿Esto es algo puntual de esta semana o vienes sintiéndolo hace tiempo? Así te doy un plan más certero.";
}
function classify(msg){const m=msg.toLowerCase();
  if(m.includes("estr")||m.includes("cansad"))return{t:"burnout"};
  if(m.includes("jefe")||m.includes("lider"))return{t:"leadership"};
  if(m.includes("motiv"))return{t:"motivation"};
  if(m.includes("carga")||m.includes("tarea"))return{t:"workload"};
  return{t:"communication"};}

/* ---------- DOWNLOAD SELF ---------- */
function downloadSelf(){
  const html="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  const blob=new Blob([html],{type:"text/html"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="tuparch3.html";a.click();
}

/* ============================================================
   ROUTER
============================================================ */
function go(v){window.scrollTo(0,0);render(v);}
function render(view="landing"){
  CURRENT_VIEW=view;
  const app=document.getElementById("app");
  let html="";
  if(view==="landing")html=Landing();
  else if(view==="login")html=Login();
  else if(view==="onboard")html=Onboard();
  else if(view==="app"){ if(!SESSION){go("login");return;} html=Shell(); }
  app.innerHTML=`<div class="fade-in">${html}</div>`;
  if(view==="app")mountApp();
}

  go("app");

function ChatView(){return `

<p class="text-sm ${subtext()} mb-4">Conversación privada · nunca compartida con tu líder 🔒</p>

<div class="mt-3 flex gap-2">

  <button onclick="sendMsg()" class="rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white px-5 font-medium transition">Enviar</button>
</div>`;}
let chatHistory=[];
function initChat(){chatHistory=[];bubble("assistant","¡Hola "+SESSION.name.split(" ")[0]+"! 👋 Soy tu coach de bienestar. ¿Qué tal va tu semana?");}
function bubble(role,text,topic){const box=document.getElementById("chatbox");const me=role==="user";
  box.innerHTML+=`<div class="flex ${me?'justify-end':'justify-start'}"><div class="rounded-2xl px-4 py-3 max-w-[80%] text-sm leading-relaxed ${me?'bg-indigo-600 text-white':(isDark()?'bg-zinc-800':'bg-zinc-100')}">${text}${topic?`<span class="block mt-1 text-[10px] uppercase tracking-wide opacity-50">${topic}</span>`:''}</div></div>`;
  box.scrollTop=box.scrollHeight;}
async function sendMsg(){const input=document.getElementById("msg");const t=input.value.trim();if(!t)return;input.value="";
  bubble("user",t,classify(t).t);chatHistory.push({role:"user",content:t});
  const box=document.getElementById("chatbox");
  box.innerHTML+=`<div id="typing" class="${subtext()} text-sm animate-pulse pl-2">Coach está escribiendo…</div>`;box.scrollTop=box.scrollHeight;
  const r=await aiReply(t,chatHistory);document.getElementById("typing")?.remove();
  bubble("assistant",r);chatHistory.push({role:"assistant",content:r});}

  </div></div>`;}).join("")}</div>`;}
function RiskView(){return `
<h2 class="text-2xl font-bold mb-6">Riesgo de Rotación por Equipo</h2><div class="space-y-3">
${[...DB.teams].sort((a,b)=>b.retention-a.retention).map(t=>{const c=t.retention>50?"rose":t.retention>30?"amber":"emerald";
  return `<div class="rounded-xl border ${card()} p-4 flex items-center gap-4"><span class="w-28 font-medium">${t.name}</span>
  <div class="flex-1 h-2 ${isDark()?'bg-zinc-800':'bg-zinc-200'} rounded-full"><div class="h-2 bg-${c}-500 rounded-full" style="width:${t.retention}%"></div></div>
  <span class="text-${c}-400 font-semibold w-12 text-right">${t.retention}%</span></div>`;}).join("")}</div>`;}
function InsightsView(){return `
<h2 class="text-2xl font-bold mb-6">Insights Automáticos de IA</h2><div class="space-y-3">
${DB.insights.map(i=>{const c={critical:"rose",warning:"amber",info:"indigo"}[i.sev];
  return `<div class="rounded-2xl border border-${c}-700 ${isDark()?`bg-${c}-950/20`:`bg-${c}-50`} p-5"><span class="text-xs uppercase tracking-wide text-${c}-400 font-semibold">${i.sev}</span>
  <h3 class="font-semibold mt-1">${i.title}</h3><p class="text-sm ${subtext()} mt-1">${i.body}</p></div>`;}).join("")}</div>`;}

/* ---------- TRENDS (Chart.js) ---------- */
function TrendsView(){return `<h2 class="text-2xl font-bold mb-6">Tendencias de Bienestar</h2>
<div class="rounded-2xl border ${card()} p-6"><canvas id="trendChart" height="110"></canvas></div>`;}
function drawTrend(){const ctx=document.getElementById("trendChart");if(!ctx)return;
  chartRef=new Chart(ctx,{type:"line",data:{labels:["S6","S7","S8","S9","S10","S11","S12"],
    datasets:[{label:"WorkPulse",data:DB.trend,borderColor:"#6366f1",backgroundColor:"rgba(99,102,241,.15)",fill:true,tension:.4,pointRadius:4}]},
    options:{plugins:{legend:{labels:{color:isDark()?"#a1a1aa":"#52525b"}}},scales:{y:{min:0,max:100,grid:{color:isDark()?"#27272a":"#e4e4e7"},ticks:{color:isDark()?"#a1a1aa":"#52525b"}},x:{grid:{display:false},ticks:{color:isDark()?"#a1a1aa":"#52525b"}}}}});}

/* ---------- ADMIN ---------- */
function ExecView(){const r=computeROI(DB.teams);const avg=Math.round(DB.teams.reduce((a,t)=>a+t.workpulse,0)/DB.teams.length);
  return `<h2 class="text-2xl font-bold mb-6">Dashboard Ejecutivo</h2>
<div class="grid md:grid-cols-4 gap-4 mb-8">${[["WorkPulse Global",avg,"indigo"],["Empleados",r.totalEmp,"zinc"],["Ahorro Anual",fmt(r.savings),"emerald"],["ROI",r.roi+"%","emerald"]].map(([l,v,c])=>`
  <div class="rounded-2xl border ${card()} p-5"><p class="text-xs ${subtext()}">${l}</p><p class="text-3xl font-bold text-${c}-400 mt-1">${v}</p></div>`).join("")}</div>
<div class="grid md:grid-cols-2 gap-4">
 <div class="rounded-2xl border ${card()} p-6"><h3 class="font-semibold mb-3">Burnout por equipo</h3><canvas id="execChart" height="160"></canvas></div>
 <div class="rounded-2xl border ${card()} p-6"><h3 class="font-semibold mb-3">📈 Predicción</h3><p class="text-sm ${subtext()}">Sin intervención: ~<b class="text-rose-400">6 renuncias</b> en 90 días, costo estimado <b>${fmt(Math.round(r.turnoverCost*0.3))}</b>.</p>
 <h3 class="font-semibold mt-5 mb-2">🔥 Riesgo crítico</h3>${DB.teams.filter(t=>t.burnout>60).map(t=>`<p class="text-sm text-rose-400 py-0.5">${t.name} — burnout ${t.burnout}/100</p>`).join("")}</div>
</div>`;}
function drawExecChart(){const ctx=document.getElementById("execChart");if(!ctx)return;
  chartRef=new Chart(ctx,{type:"bar",data:{labels:DB.teams.map(t=>t.name),datasets:[{label:"Burnout",data:DB.teams.map(t=>t.burnout),
    backgroundColor:DB.teams.map(t=>t.burnout>65?"#f43f5e":t.burnout>45?"#f59e0b":"#10b981")}]},
    options:{plugins:{legend:{display:false}},scales:{y:{min:0,max:100,grid:{color:isDark()?"#27272a":"#e4e4e7"},ticks:{color:isDark()?"#a1a1aa":"#52525b"}},x:{grid:{display:false},ticks:{color:isDark()?"#a1a1aa":"#52525b"}}}}});}
function RoiView(){const r=computeROI(DB.teams);return `
<h2 class="text-2xl font-bold mb-1">ROI Financiero del Bienestar</h2>
<p class="text-sm ${subtext()} mb-6">Modelo basado en baselines de industria (rotación, productividad, ausentismo)</p>
<div class="grid md:grid-cols-3 gap-4 mb-6">${[["Costo de Rotación (riesgo)",fmt(r.turnoverCost),"rose"],["Productividad Perdida",fmt(r.prodLoss),"amber"],["Ahorro Estimado / año",fmt(r.savings),"emerald"]].map(([l,v,c])=>`
  <div class="rounded-2xl border ${card()} p-5"><p class="text-xs ${subtext()}">${l}</p><p class="text-2xl font-bold text-${c}-400 mt-1">${v}</p></div>`).join("")}</div>
<div class="rounded-2xl border border-emerald-700 ${isDark()?'bg-emerald-950/20':'bg-emerald-50'} p-8 text-center">
  <p class="${subtext()}">Retorno de inversión proyectado</p><p class="text-6xl font-bold text-emerald-400 mt-2">${r.roi}%</p>
  <p class="text-sm ${subtext()} mt-3">Por cada $1 invertido en TUPARCH3, retorno estimado de $${(1+r.roi/100).toFixed(2)} en ahorro de rotación y productividad recuperada.</p></div>`;}

/* ---------- INIT ---------- */
(function(){const t=localStorage.getItem('t3theme');if(t==='light'){document.documentElement.classList.remove('dark');document.body.className="bg-zinc-50 text-zinc-900 transition-colors duration-300";}})();
render("landing");
</script>
</body>
</html>
